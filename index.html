<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA PARSER - MESTRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --terminal-black: #0a0a0a;
            --glass: rgba(20, 20, 20, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #050505;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            color: var(--neon-green);
            font-family: 'Source Code Pro', monospace;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: 20px; overflow-x: hidden;
        }

        /* 1. SISTEMA DE LOGIN COM CÓDIGO */
        #lock-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        .terminal-card {
            border: 2px solid var(--neon-purple); padding: 40px; border-radius: 10px;
            box-shadow: 0 0 20px var(--neon-purple); text-align: center; background: #000;
        }

        input {
            background: transparent; border: 1px solid var(--neon-green);
            padding: 15px; color: var(--neon-green); font-family: 'Orbitron';
            text-align: center; width: 100%; margin-top: 20px; outline: none;
            box-shadow: inset 0 0 5px var(--neon-green);
        }

        /* 2. ÁREA DE GERAÇÕES RESTANTES */
        .status-header {
            width: 100%; max-width: 600px; padding: 15px;
            border: 1px solid var(--neon-purple); border-radius: 8px;
            margin-bottom: 20px; text-align: center; background: var(--glass);
        }

        .gen-count { font-family: 'Orbitron'; color: #ffd700; font-size: 20px; }

        /* 3. ESTÉTICA CYBER TERMINAL */
        h1 { font-family: 'Orbitron'; text-shadow: 0 0 10px var(--neon-green); margin-bottom: 20px; }

        textarea {
            width: 100%; max-width: 600px; height: 120px;
            background: #111; border: 1px solid var(--neon-purple);
            color: #aaa; padding: 10px; border-radius: 5px; outline: none;
        }

        .btn-gen {
            width: 100%; max-width: 600px; padding: 15px; margin-top: 15px;
            background: var(--neon-purple); color: #fff; border: none;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
            transition: 0.3s;
        }

        .btn-gen:hover { filter: brightness(1.3); box-shadow: 0 0 15px var(--neon-purple); }

        /* CARDS GERADOS */
        .results { width: 100%; max-width: 600px; margin-top: 30px; }

        .card-pro {
            background: var(--glass); border: 1px solid #333; padding: 25px;
            border-radius: 10px; margin-bottom: 20px; position: relative;
            border-left: 5px solid var(--neon-green);
        }

        .badge-health { position: absolute; top: 10px; right: 10px; font-size: 10px; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 2px 5px; }

        .field-label { font-size: 10px; color: var(--neon-purple); display: block; margin-top: 10px; }
        .field-value { font-size: 14px; word-break: break-all; color: #fff; }

        .m3u-box {
            background: #000; border: 1px dashed var(--neon-green);
            padding: 10px; font-size: 12px; margin-top: 10px; overflow-x: scroll;
        }

        .copy-btn {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 5px 15px; font-size: 10px;
            margin-top: 10px; cursor: pointer; transition: 0.3s;
        }
        .copy-btn:hover { background: var(--neon-green); color: #000; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="terminal-card">
            <h2 style="font-family: 'Orbitron';">SISTEMA BLOQUEADO</h2>
            <p style="font-size: 10px;">INSIRA O CÓDIGO DE ACESSO MESTRE</p>
            <input type="password" id="access-code" placeholder="____">
            <button class="btn-gen" onclick="unlock()">DESBLOQUEAR</button>
        </div>
    </div>

    <div class="status-header">
        <p style="font-size: 10px;">GERAÇÕES RESTANTES (LIMITE: 100)</p>
        <span class="gen-count" id="gen-limit">100</span>
    </div>

    <h1>NEON PARSER 2026</h1>
    <textarea id="raw-input" placeholder="Cole sua lista bagunçada aqui..."></textarea>
    <button class="btn-gen" onclick="generate()">⚡ GERAR CREDENCIAIS ⚡</button>

    <div class="results" id="output"></div>

<script>
    let limit = 100;
    const MASTER_CODE = "MESTRE2026"; // Seu código de acesso
    const SEEN_DATA = new Set(); // 4. SISTEMA ANTI-REPETIÇÃO

    function unlock() {
        const code = document.getElementById('access-code').value;
        if(code === MASTER_CODE) {
            document.getElementById('lock-screen').style.display = 'none';
        } else {
            alert("CÓDIGO INVÁLIDO!");
        }
    }

    function generate() {
        const input = document.getElementById('raw-input').value;
        const output = document.getElementById('output');
        
        // 5. PARSER INTELIGENTE
        const blocks = input.split(/┏●|『|┏●▬▬▬▬▬/).filter(b => b.includes('Host') || b.includes('🌐Host') || b.includes('Sᴇʀᴠɪᴅᴏʀ'));
        
        blocks.forEach(block => {
            const host = block.match(/(?:Host|Sᴇʀᴠɪᴅᴏʀ)\s*►\s*(http:\/\/[a-zA-Z0-9.-]+:[0-9]+)/i)?.[1];
            const user = block.match(/(?:Usuário|Usᴜᴀʀɪᴏ|👤Usuário)\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1];
            const pass = block.match(/(?:Senha|Sᴇɴʜᴀ|🔒Senha)\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1];
            const exp = block.match(/(?:Expira|Vᴇɴᴄɪᴍᴇɴᴛᴏ)\s*►\s*([0-9\/]+)/i)?.[1];

            const uniqueKey = `${host}|${user}|${pass}`;

            // VERIFICA SE JÁ FOI GERADO (ANTI-REPETIÇÃO)
            if(host && user && pass && !SEEN_DATA.has(uniqueKey) && limit > 0) {
                SEEN_DATA.add(uniqueKey);
                limit--;
                document.getElementById('gen-limit').innerText = limit;

                const m3u = `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=ts`;

                const card = `
                <div class="card-pro">
                    <span class="badge-health">ONLINE STATUS: CHECKED</span>
                    
                    <span class="field-label">HOST / PORTAL</span>
                    <span class="field-value">${host}</span>

                    <span class="field-label">LOGIN CREDENTIALS</span>
                    <span class="field-value" style="color: var(--neon-green)">USER: ${user} | PASS: ${pass}</span>

                    <span class="field-label">DATA EXPIRAÇÃO</span>
                    <span class="field-value">${exp || 'VERIFICAR NO PAINEL'}</span>

                    <span class="field-label">LINK M3U (COMPLETO)</span>
                    <div class="m3u-box">${m3u}</div>

                    <button class="copy-btn" onclick="copy('${m3u}')">COPIAR M3U COMPLETO</button>
                </div>
                `;
                output.insertAdjacentHTML('afterbegin', card);
            }
        });
    }

    function copy(text) {
        navigator.clipboard.writeText(text);
        alert("COPIADO PARA O TERMINAL!");
    }
</script>
</body>
</html>
