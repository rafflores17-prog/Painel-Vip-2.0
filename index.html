<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAINEL VIP APKBUGADO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #00ff9c; --neon-purple: #bc13fe; --dark: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--dark); color: #fff;
            font-family: 'Source Code Pro', monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
        }

        .card-painel {
            width: 100%; max-width: 420px; padding: 25px;
            border: 1px solid var(--neon-green); border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,255,156,0.3); text-align: center;
            background: rgba(5, 5, 5, 0.95);
        }

        /* LOGO EM CÓDIGO (CSS) */
        .logo-vip { display: flex; justify-content: center; margin-bottom: 20px; }
        .circle {
            width: 140px; height: 140px; border-radius: 50%;
            border: 3px solid var(--neon-green); position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--neon-green);
        }
        .circle::before {
            content: "VIP"; font-family: 'Orbitron'; font-size: 35px; color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }
        .circle::after {
            content: ""; position: absolute; inset: -8px;
            border: 2px dashed var(--neon-purple); border-radius: 50%;
            animation: girar 10s linear infinite;
        }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* LINKS */
        .links-topo { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-atalho {
            flex: 1; padding: 12px; border-radius: 12px; font-size: 11px;
            font-weight: bold; text-decoration: none; border: 1px solid var(--neon-green);
            color: var(--neon-green); background: #012; font-family: 'Orbitron';
        }

        /* INPUT E BOTÕES */
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--neon-green);
            background: #000; color: var(--neon-green); text-align: center; font-size: 15px; margin-bottom: 10px;
        }
        button {
            width: 100%; padding: 15px; border-radius: 12px; background: transparent;
            border: 1px solid var(--neon-green); color: var(--neon-green);
            font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 5px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button:hover:not(:disabled) { background: var(--neon-green); color: #000; }

        /* ÁREA DE SAÍDA (O CARD GERADO) */
        #out {
            background: #020202; padding: 15px; margin-top: 20px;
            border-radius: 15px; font-size: 12px; text-align: left;
            color: var(--neon-green); border: 1px solid var(--neon-green);
            min-height: 150px; white-space: pre-wrap; word-break: break-all;
            display: none; /* Escondido até gerar */
        }

        .status { margin-top: 10px; font-size: 11px; color: #888; }
        .typing { border-right: 2px solid var(--neon-green); animation: blink 0.7s infinite; }
        @keyframes blink { 50% { border-color: transparent } }
    </style>
</head>
<body>

<div class="card-painel">
    <div style="color:var(--neon-green); letter-spacing: 4px; margin-bottom: 15px; font-family: 'Orbitron';">[ VIP_PAINEL ]</div>

    <div class="logo-vip">
        <div class="circle"></div>
    </div>

    <div class="links-topo">
        <a href="#" class="btn-atalho">💎 ENTRAR VIP</a>
        <a href="#" class="btn-atalho">📢 GRUPO</a>
    </div>

    <div id="login-box">
        <input type="password" id="senha" placeholder="DIGITE CÓDIGO MESTRE">
        <button onclick="login()">DESBLOQUEAR</button>
    </div>

    <div id="painel" style="display:none;">
        <button id="btn-gerar" onclick="gerar()">GERAR CONTA ALEATÓRIA</button>
        <button onclick="copiar()">COPIAR DADOS</button>

        <div class="status" id="status">SISTEMA PRONTO</div>
        <pre id="out"></pre>
    </div>
</div>

<script>
let listaGlobal = [];
let emProcesso = false;

// 1. LOGIN (Puxando do config.json para segurança)
async function login() {
    const input = document.getElementById('senha').value.trim();
    try {
        const res = await fetch('config.json');
        const config = await res.json();
        
        if (config.access_keys.includes(input)) {
            document.getElementById('login-box').style.display = "none";
            document.getElementById('painel').style.display = "block";
            carregarDados(); // Sincroniza em background
        } else { alert("CÓDIGO INVÁLIDO!"); }
    } catch(e) { alert("Erro ao validar acesso!"); }
}

// 2. CARREGAR DADOS DO TXT (Sincronização)
async function carregarDados() {
    const status = document.getElementById('status');
    status.textContent = "SINCRONIZANDO BANCO DE DADOS...";
    
    try {
        const res = await fetch('listas.txt');
        const text = await res.text();
        
        // Extrai todas as contas do TXT e coloca no Array
        const blocks = text.split(/┏●|『|▬▬▬▬▬|🌐Host/).filter(b => b.includes('http'));
        
        listaGlobal = blocks.map(block => {
            return {
                host: block.match(/(?:http:\/\/[a-zA-Z0-9.-]+:[0-9]+)/i)?.[0],
                user: block.match(/(?:Usuário|Usᴜᴀʀɪᴏ|👤Usuário)\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1],
                pass: block.match(/(?:Senha|Sᴇɴʜᴀ|🔒Senha)\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1],
                exp: block.match(/(?:Expira|Vᴇɴᴄɪᴍᴇɴᴛᴏ|⏳Expira)\s*►\s*([0-9\/.]+)/i)?.[1]
            };
        }).filter(acc => acc.host && acc.user && acc.pass);

        status.textContent = `SISTEMA ONLINE: ${listaGlobal.length} CONTAS CARREGADAS`;
    } catch(e) { status.textContent = "ERRO AO CARREGAR LISTAS.TXT"; }
}

// 3. LÓGICA DE SORTEIO (RANDOM)
async function gerar() {
    if (emProcesso || listaGlobal.length === 0) return;
    emProcesso = true;

    const btn = document.getElementById('btn-gerar');
    const status = document.getElementById('status');
    const out = document.getElementById('out');

    btn.disabled = true;
    out.style.display = "none";
    
    // Efeito de "Minerando"
    const fases = [" minerando contas...", " validando acesso...", " criptografando..."];
    for(let f of fases) {
        status.innerHTML = `<span style="color:var(--neon-purple)">●</span> ${f}`;
        await new Promise(r => setTimeout(r, 600));
    }

    // SORTEIO ALEATÓRIO
    const sorteada = listaGlobal[Math.floor(Math.random() * listaGlobal.length)];
    const link = `${sorteada.host}/get.php?username=${sorteada.user}&password=${sorteada.pass}&type=m3u_plus&output=ts`;

    // EXIBIÇÃO NO CARD
    out.innerHTML = `💎 <span class="typing">VIP APKBUGADO PREMIUM</span>

🔗 URL M3U8:
<span style="color:#fff">${link}</span>

⚙️ XTREAM:
Host: ${sorteada.host}
User: ${sorteada.user}
Pass: ${sorteada.pass}

📅 VENCIMENTO: ${sorteada.exp || '20/12/2026'}`;

    out.style.display = "block";
    status.innerHTML = "🟢 CONTA GERADA COM SUCESSO!";
    btn.disabled = false;
    emProcesso = false;
}

function copiar() {
    const out = document.getElementById('out');
    if (out.style.display === "block") {
        navigator.clipboard.writeText(out.textContent);
        alert("DADOS COPIADOS!");
    }
}
</script>
</body>
</html>
