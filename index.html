<script>
let listaContas = [];
let contasUsadas = [];

async function validarAcesso() {
    const input = document.getElementById('senhaInput').value.trim();
    try {
        const response = await fetch('config.json?v=' + Date.now());
        const config = await response.json();

        if(config.access_keys.includes(input)) {
            document.getElementById('login-box').style.display = "none";
            document.getElementById('painel').style.display = "block";
            carregarDatabase();
        } else {
            alert("ACESSO NEGADO!");
        }
    } catch (e) {
        alert("ERRO DE CONFIGURAÇÃO");
    }
}

// 🔥 PARSER PRO (LÊ QUALQUER BAGUNÇA)
async function carregarDatabase() {
    try {
        const r = await fetch('listas.txt?v=' + Date.now());
        const t = await r.text();

        // Divide blocos por "Host" ou "http"
        const blocos = t.split(/(?=http|Host|Servidor)/gi);

        listaContas = blocos.map(b => {

            // HOST
            let host = b.match(/http:\/\/[^\s]+:\d+/i)?.[0];

            // USER (múltiplos padrões)
            let user = b.match(/(?:Usu[aá]rio|User|username)[^a-zA-Z0-9]*([a-zA-Z0-9._-]+)/i)?.[1];

            // PASS
            let pass = b.match(/(?:Senha|Pass|password)[^a-zA-Z0-9]*([a-zA-Z0-9._-]+)/i)?.[1];

            // EXPIRAÇÃO
            let exp = b.match(/(?:Expira|Vencimento)[^0-9]*([0-9\/]+)/i)?.[1];

            // 🔥 BACKUP MASTER (link M3U SEMPRE GANHA)
            let m3u = b.match(/http:\/\/[^\s]+get\.php\?username=([a-zA-Z0-9._-]+)&password=([a-zA-Z0-9._-]+)/i);

            if(m3u){
                host = m3u[0].match(/http:\/\/[^\s]+:\d+/i)?.[0];
                user = m3u[1];
                pass = m3u[2];
            }

            return { host, user, pass, exp };

        }).filter(a => a.host && a.user && a.pass);

        document.getElementById('status').textContent =
            `${listaContas.length} CONTAS CARREGADAS`;

    } catch(e) {
        document.getElementById('status').textContent =
            "ERRO AO CARREGAR LISTA";
    }
}

// 🚀 GERAR CONTA (SEM BUG)
function gerarAcesso() {
    const out = document.getElementById('out');
    const btn = document.getElementById('btn-gerar');

    if(listaContas.length === 0){
        alert("SEM CONTAS!");
        return;
    }

    // RESET VISUAL
    out.style.display = "none";
    out.innerHTML = "";

    btn.classList.add('processing');
    btn.innerText = "PROCESSANDO...";
    btn.disabled = true;

    document.getElementById('status').textContent = "ESCANEANDO...";
    navigator.vibrate(50);

    setTimeout(() => {

        let disponiveis = listaContas.filter(c => !contasUsadas.includes(c.user));

        if(disponiveis.length === 0){
            contasUsadas = [];
            disponiveis = listaContas;
        }

        if(!disponiveis.length){
            alert("SEM CONTAS DISPONÍVEIS");
            return;
        }

        const conta = disponiveis[Math.floor(Math.random() * disponiveis.length)];
        contasUsadas.push(conta.user);

        const urlM3u =
            `${conta.host}/get.php?username=${conta.user}&password=${conta.pass}&type=m3u_plus&output=ts`;

        out.innerHTML = `
        <span style="color:#bc13fe;font-weight:bold;">💎 ACESSO VIP</span><br>

        <span class="label">LINK M3U:</span>
        <span class="val-m3u">${urlM3u}</span>

        <span class="label">HOST:</span>
        <span style="color:#00d2ff">${conta.host}</span><br>

        <span style="color:#fff">USER: ${conta.user}</span><br>
        <span style="color:#f9d423">PASS: ${conta.pass}</span>

        <span class="label">VALIDADE:</span>
        <span style="color:#00ff9c">${conta.exp || "ILIMITADO"}</span>
        `;

        // RESET BOTÃO
        btn.classList.remove('processing');
        btn.innerText = "GERAR CONTA IPTV";
        btn.disabled = false;

        out.style.display = "block";
        setTimeout(() => out.style.opacity = "1", 50);

        out.scrollIntoView({behavior: "smooth"});

        document.getElementById('status').textContent =
            `GERADAS: ${contasUsadas.length}/${listaContas.length}`;

    }, 800);
}

// 📋 COPIAR MODERNO
function copiarDados() {
    const out = document.getElementById('out');

    if(out.style.display !== "block"){
        alert("NADA PARA COPIAR");
        return;
    }

    navigator.clipboard.writeText(out.innerText)
        .then(() => alert("COPIADO COM SUCESSO"))
        .catch(() => alert("ERRO AO COPIAR"));
}
</script>
