<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GERADOR IPTV VIP</title>
    <style>
        :root { --primary: #00ff88; --bg: #050505; --card: #0f0f0f; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; padding: 15px; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #1a1a1a; }
        .title { color: var(--primary); text-align: center; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        
        .ad-container { margin: 15px 0; text-align: center; min-height: 50px; background: #000; border-radius: 10px; border: 1px dashed #333; overflow: hidden; }

        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-sub { flex: 1; padding: 12px; border-radius: 10px; border: none; color: #fff; font-weight: bold; cursor: pointer; }
        .btn-vip { background: #8a2be2; }
        .btn-free { background: #1e90ff; }

        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 16px; }
        
        #logs { background: #000; border-radius: 10px; padding: 15px; font-family: monospace; font-size: 13px; color: var(--primary); margin-bottom: 15px; border: 1px solid #111; min-height: 50px; }
        
        .box-info { background: #141414; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #0088cc; }
        .label { font-size: 11px; color: #0088cc; font-weight: bold; margin-bottom: 5px; }
        .val { font-size: 13px; color: #eee; word-break: break-all; }
        
        #login-screen { text-align: center; padding: 20px 0; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--primary); border-radius: 12px; text-align: center; font-size: 20px; margin-bottom: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="title">ACESSO RESTRITO</div>
        <input type="password" id="keyInput" placeholder="SENHA VIP">
        <button class="btn-main" onclick="entrar()">ENTRAR NO PAINEL</button>
    </div>

    <div id="main-panel" style="display:none">
        <div class="title">GERADOR IPTV VIP</div>

        <div class="ad-container">
            <script type="text/javascript">
                atOptions = { 'key' : 'a8a116d252f41a02d16bcf030d61ce58', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
            </script>
            <script type="text/javascript" src="//encouragingjawsordinarily.com/invoke.js"></script>
        </div>

        <div class="btn-row">
            <button class="btn-sub btn-vip" onclick="window.open('https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507')">💎 GRUPO VIP</button>
            <button class="btn-sub btn-free">📢 GRUPO FREE</button>
        </div>

        <button class="btn-main" id="btnGerar" onclick="gerar()">🚀 GERAR LISTA IPTV</button>

        <div id="logs">📡 Aguardando comando...</div>

        <div id="resultado" style="display:none">
            <div class="box-info"><div class="label">M3U</div><div id="res-m3u" class="val"></div></div>
            <div style="display:flex; gap:10px;">
                <div class="box-info" style="flex:1"><div class="label">Usuário</div><div id="res-u" class="val"></div></div>
                <div class="box-info" style="flex:1"><div class="label">Senha</div><div id="res-p" class="val"></div></div>
            </div>
        </div>

        <div class="ad-container">
            <a href="https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507" target="_blank" style="color:#555; text-decoration:none; font-size:11px; display:block; padding:10px;">CLIQUE AQUI PARA MAIS VELOCIDADE</a>
        </div>
    </div>
</div>

<script>
    const URL_LISTA = "https://raw.githubusercontent.com/rafflores17-prog/Painel-Vip-2.0/main/listas.txt";
    let dados = [];

    async function entrar() {
        if(document.getElementById("keyInput").value === "VIP2030") {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-panel").style.display = "block";
            carregarDados();
        } else { alert("Senha Errada!"); }
    }

    async function carregarDados() {
        const logs = document.getElementById("logs");
        try {
            // Usa proxy para evitar "Erro no Servidor" no Vercel
            const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(URL_LISTA + "?" + Date.now());
            const resp = await fetch(proxy);
            const json = await resp.json();
            
            const partes = json.contents.split(/┏●/);
            dados = partes.map(p => {
                const h = p.match(/Host\s*►\s*(https?:\/\/[^\s\n\r]+)/i);
                const u = p.match(/Usuário\s*►\s*([^\s\n\r]+)/i);
                const psw = p.match(/Senha\s*►\s*([^\s\n\r]+)/i);
                return (h && u && psw) ? {h: h[1], u: u[1], p: psw[1]} : null;
            }).filter(x => x);

            logs.innerHTML = `✅ Sucesso! ${dados.length} listas carregadas.`;
        } catch(e) { logs.innerHTML = "❌ Erro ao conectar com o banco de dados."; }
    }

    function gerar() {
        if(dados.length === 0) return alert("Lista carregando, aguarde...");
        const resDiv = document.getElementById("resultado");
        const item = dados[Math.floor(Math.random() * dados.length)];
        
        document.getElementById("res-m3u").innerText = `${item.h}/get.php?username=${item.u}&password=${item.p}&type=m3u_plus&output=ts`;
        document.getElementById("res-u").innerText = item.u;
        document.getElementById("res-p").innerText = item.p;
        
        resDiv.style.display = "block";
        document.getElementById("logs").innerHTML = "✅ ACESSO GERADO COM SUCESSO!";
        
        // Seu anúncio abre ao gerar
        window.open('https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507', '_blank');
    }
</script>
</body>
</html>
