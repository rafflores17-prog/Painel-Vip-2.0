<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR VIP IPTV</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

body{
background:#050505;
color:#fff;
font-family:'Share Tech Mono', monospace;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#0a0a0a;
padding:20px;
border-radius:20px;
box-shadow:0 0 40px #000;
margin-top:-80px;
}

.title{
text-align:center;
font-family:'Orbitron';
color:#00ff9c;
margin-bottom:10px;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #111;
background:#000;
color:#00ff9c;
text-align:center;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
position:relative;
overflow:hidden;
transition:.2s;
}

.btn:active{transform:scale(0.95);}

.main{
background:linear-gradient(135deg,#00ff9c,#008f58);
color:#000;
}

.vip{
background:linear-gradient(135deg,#bc13fe,#7a00aa);
color:#fff;
}

.free{
background:linear-gradient(135deg,#00d2ff,#006a80);
color:#fff;
}

.grid{
display:flex;
gap:10px;
}

.status{
text-align:center;
font-size:12px;
color:#00ff9c;
margin-top:10px;
min-height:20px;
}

#out{
display:none;
margin-top:15px;
}

.box{
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.label{
font-size:10px;
color:#777;
}

.val{
font-size:13px;
word-break:break-word;
}

.green{color:#00ff9c;}
.blue{color:#00d2ff;}
.white{color:#fff;}
.purple{color:#bc13fe;}
.red{color:#ff4d4d;}

.row{
display:flex;
gap:10px;
}

.col{
flex:1;
}

</style>
</head>

<body>

<div class="card">

<div class="title">GERADOR VIP IPTV</div>

<div id="login">
<input type="password" id="senha" placeholder="Digite a chave">
<button class="btn main" onclick="logar()">DESBLOQUEAR</button>
</div>

<div id="painel" style="display:none;">

<div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
<button class="btn vip">💎 GRUPO VIP</button></a>

<a href="https://t.me/ApkBugado" target="_blank">
<button class="btn free">📢 GRUPO FREE</button></a>
</div>

<button class="btn main" onclick="gerar(this)">🚀 GERAR ACESSO</button>
<button class="btn main" onclick="copiar()">📋 COPIAR</button>

<div class="status" id="status"></div>
<div id="out"></div>

</div>
</div>

<script>

let lista=[];

/* LOGIN */
async function logar(){
try{
let senha=document.getElementById("senha").value.trim();
let cfg=await (await fetch("config.json?"+Date.now())).json();

if(cfg.access_keys.includes(senha)){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
carregar();
}else alert("Senha inválida");

}catch{
alert("Erro config.json");
}
}

/* CARREGAR */
async function carregar(){
let txt=await (await fetch("listas.txt?"+Date.now())).text();

lista = txt.split("\n").map(l=>{
let m=l.match(/(http[^\s]+).*username=([^\s&]+).*password=([^\s&]+)/i);
if(m){
return {host:m[1].split("/get")[0],user:m[2],pass:m[3]};
}
}).filter(x=>x);

status.innerText="✔ Sistema pronto";
}

/* DELAY VISUAL */
function sleep(ms){
return new Promise(r=>setTimeout(r,ms));
}

/* GERAR (SCAN REAL) */
async function gerar(btn){

btn.disabled = true;
out.style.display="none";

let etapas=[
"🔍 Conectando servidor...",
"📡 Estabelecendo conexão...",
"🔐 Descriptografando dados...",
"🧠 Analisando base...",
"⚡ Buscando listas online...",
"📦 Processando dados...",
"✅ Concluído"
];

for(let etapa of etapas){
status.innerText = etapa;
await sleep(600); // TEMPO VISÍVEL
}

// força render antes do resultado
await sleep(300);

let c=lista[Math.floor(Math.random()*lista.length)];

let m3u=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

out.innerHTML=`
<div class="box">
<div class="label">🔗 M3U</div>
<div class="val green">${m3u}</div>
</div>
`;

out.style.display="block";
status.innerText="🚀 Acesso liberado";

btn.disabled = false;
}

/* COPIAR */
function copiar(){
navigator.clipboard.writeText(out.innerText);
status.innerText="✔ Copiado";
}

</script>
</body>
</html>
