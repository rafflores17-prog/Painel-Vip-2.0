<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador VIP IPTV</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><style>

body{
background:#050505;
color:#fff;
font-family:'Inter';
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
width:100%;
max-width:420px;
background:#0d0d0d;
padding:20px;
border-radius:20px;
box-shadow:0 0 50px #000;
}

/* LOGIN */
.title{
text-align:center;
font-family:'Orbitron';
color:#00ff9c;
margin-bottom:10px;
}

.input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #222;
background:#000;
color:#00ff9c;
text-align:center;
margin-bottom:10px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
background:#00ff9c;
color:#000;
margin-top:10px;
}

/* LINKS */
.grid{
display:flex;
gap:10px;
margin-top:10px;
}

.vip{background:#bc13fe;color:#fff;}
.free{background:#00d2ff;color:#000;}

.status{
font-size:11px;
text-align:center;
margin-top:10px;
color:#aaa;
}

.progress{
height:5px;
background:#111;
border-radius:10px;
margin-top:10px;
overflow:hidden;
display:none;
}

.progress span{
display:block;
height:100%;
width:0%;
background:#00ff9c;
}

/* RESULT */
#out{
display:none;
margin-top:20px;
}

.card-info{
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.label{
font-size:10px;
color:#777;
}

.value{
font-size:13px;
word-break:break-all;
}

</style></head><body><div class="card"><div class="title">GERADOR VIP IPTV</div><div id="login">
<input class="input" id="senha" placeholder="Digite a chave">
<button class="btn" onclick="logar()">Desbloquear</button><div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
<button class="btn vip">VIP</button></a><a href="https://t.me/ApkBugado" target="_blank">
<button class="btn free">FREE</button></a>
</div></div><div id="painel" style="display:none;"><button class="btn" onclick="gerar()">GERAR ACESSO</button>

<div class="status" id="status"></div>
<div class="progress"><span id="bar"></span></div><div id="out"></div></div></div><script>

/* 🔥 NORMALIZAÇÃO */
function limpar(txt){
return txt.normalize("NFKD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\x00-\x7F]/g,"")
.toLowerCase();
}

let lista=[];

/* LOGIN */
async function logar(){
let senha=document.getElementById("senha").value.trim();
let cfg=await (await fetch("config.json")).json();

if(cfg.access_keys.includes(senha)){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
carregar();
}else alert("Acesso negado");
}

/* PARSER ULTRA */
async function carregar(){

let txt=await (await fetch("listas.txt?"+Date.now())).text();

let blocos=txt.split(/┏|『/g);

lista=blocos.map(b=>{

let clean=limpar(b);

let host=b.match(/http:\/\/[^\s]+:\d+/i)?.[0];

let user=clean.match(/user[^a-z0-9]*([a-z0-9._-]+)/)?.[1];
let pass=clean.match(/pass[^a-z0-9]*([a-z0-9._-]+)/)?.[1];

let m=b.match(/get\.php\?username=([^\s&]+)&password=([^\s&]+)/i);

if(m){
user=m[1];
pass=m[2];
}

let datas=[...b.matchAll(/([0-9]{2}\/[0-9]{2}\/[0-9]{4})/g)];
let exp=datas.length?datas[datas.length-1][1]:null;

if(host&&user&&pass){
return {host,user,pass,exp};
}

}).filter(x=>x);

document.getElementById("status").innerText=lista.length+" contas carregadas";
}

/* TESTE REAL */
async function testar(link){
try{
let r=await fetch(link);
return r.status==200;
}catch{return false;}
}

/* GERAR */
async function gerar(){

let status=document.getElementById("status");
let bar=document.getElementById("bar");
let out=document.getElementById("out");

out.style.display="none";

status.innerText="Analisando...";
bar.style.width="20%";

await delay(600);

status.innerText="Conectando...";
bar.style.width="50%";

await delay(600);

let c=lista[Math.floor(Math.random()*lista.length)];

let link=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

status.innerText="Testando...";
bar.style.width="80%";

let online=await testar(link);

status.innerText="Finalizando...";
bar.style.width="100%";

await delay(400);

out.innerHTML=`
<div class="card-info"><div class="label">HOST</div><div class="value">${c.host}</div></div>
<div class="card-info"><div class="label">M3U</div><div class="value">${link}</div></div>
<div class="card-info"><div class="label">USER</div><div class="value">${c.user}</div></div>
<div class="card-info"><div class="label">PASS</div><div class="value">${c.pass}</div></div>
<div class="card-info"><div class="label">VALIDADE</div><div class="value">${c.exp||"Desconhecida"}</div></div>
<div class="card-info"><div class="label">STATUS</div><div class="value">${online?"🟢 Online":"🔴 Offline"}</div></div>
`;

out.style.display="block";

}

/* DELAY */
function delay(ms){
return new Promise(r=>setTimeout(r,ms));
}

</script></body>
</html>
