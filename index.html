<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador VIP IPTV</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9c;
            --vip: #bc13fe;
            --free: #00d2ff;
            --bg: #050505;
            --card: #111;
            --text: #fff;
            --muted: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            max-width: 420px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--vip), var(--free));
        }

        .title {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-vip {
            background: var(--vip);
            color: white;
        }

        .btn-free {
            background: var(--free);
            color: #000;
        }

        .btn-main {
            background: var(--primary);
            color: #000;
            width: 100%;
            margin-bottom: 15px;
        }

        .btn-main:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(0, 255, 156, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 156, 0.2);
        }

        .credits {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-weight: 700;
        }

        .status {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
        }

        .output {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #0a0a0a;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 156, 0.2);
            animation: fadeIn 0.3s ease;
        }

        .output.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .output-title {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .link-container {
            background: #000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
        }

        .link {
            word-break: break-all;
            color: var(--primary);
            font-family: monospace;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 255, 156, 0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .details {
            display: grid;
            gap: 8px;
            font-size: 0.85rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }

        .detail-label {
            color: var(--muted);
        }

        .detail-value {
            color: var(--text);
            font-family: monospace;
        }

        /* Admin Panel - Protegido por senha */
        .admin-panel {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(188, 19, 254, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(188, 19, 254, 0.3);
        }

        .admin-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .admin-title {
            color: var(--vip);
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            color: var(--text);
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--vip);
        }

        .error-message {
            color: #ff4444;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 255, 156, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">Gerador VIP IPTV</h1>
        
        <div class="grid">
            <a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank" rel="noopener">
                <button class="btn btn-vip">VIP</button>
            </a>
            <a href="https://t.me/ApkBugado" target="_blank" rel="noopener">
                <button class="btn btn-free">FREE</button>
            </a>
        </div>

        <button class="btn btn-main" id="generateBtn" onclick="gerar()">
            GERAR ACESSO
        </button>

        <div class="stats">
            <span class="credits" id="creditsDisplay">CRÉDITOS: 20</span>
            <span class="status" id="status">Sistema pronto</span>
        </div>

        <div class="output" id="output">
            <div class="output-title">
                ✅ ACESSO GERADO
            </div>
            <div class="link-container">
                <div class="link" id="linkText"></div>
                <button class="copy-btn" onclick="copiarLink()">COPIAR</button>
            </div>
            <div class="details">
                <div class="detail-row">
                    <span class="detail-label">Usuário:</span>
                    <span class="detail-value" id="detailUser"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Senha:</span>
                    <span class="detail-value" id="detailPass"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Validade:</span>
                    <span class="detail-value" id="detailExp"></span>
                </div>
            </div>
        </div>

        <!-- Admin Panel Protegido -->
        <div class="admin-panel" id="adminPanel">
            <div class="admin-title">🔐 PAINEL ADMINISTRATIVO</div>
            <div class="input-group">
                <label>Senha de Administrador</label>
                <input type="password" id="adminPass" placeholder="Digite a senha...">
            </div>
            <div class="input-group" id="creditControl" style="display: none;">
                <label>Adicionar Créditos</label>
                <input type="number" id="addCredits" placeholder="Quantidade" min="1">
            </div>
            <button class="btn btn-vip" onclick="verificarAdmin()" id="adminBtn">ACESSAR</button>
            <div class="error-message" id="adminError">Senha incorreta!</div>
        </div>
    </div>

    <div class="toast" id="toast">Link copiado!</div>

    <script>
        // Configurações
        const CONFIG = {
            ADMIN_PASSWORD: 'admin123', // Altere para uma senha forte!
            INITIAL_CREDITS: 20,
            STORAGE_KEY: 'iptv_credits_v2'
        };

        // Estado da aplicação
        const state = {
            lista: [],
            creditos: parseInt(localStorage.getItem(CONFIG.STORAGE_KEY)) || CONFIG.INITIAL_CREDITS,
            isAdmin: false,
            currentLink: null
        };

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            atualizarDisplayCreditos();
            carregarLista();
            setupAdminAccess();
        });

        // Carregar lista de servidores
        async function carregarLista() {
            try {
                const response = await fetch('listas.txt');
                if (!response.ok) throw new Error('Arquivo não encontrado');
                
                const text = await response.text();
                state.lista = parsearLista(text);
                
                atualizarStatus(`${state.lista.length} servidores carregados`);
            } catch (error) {
                console.error('Erro ao carregar lista:', error);
                atualizarStatus('Erro ao carregar servidores', true);
            }
        }

        // Parser robusto da lista
        function parsearLista(texto) {
            const blocos = texto.split(/[┏『]/);
            
            return blocos.map(bloco => {
                // Normaliza e limpa
                const limpo = bloco.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                
                // Extrai dados com regex mais flexíveis
                const host = limpo.match(/(https?:\/\/[^\/\s]+)/i)?.[1];
                const user = limpo.match(/user[\s:=]+([a-z0-9._-]+)/i)?.[1] || 
                            limpo.match(/username[=]+([a-z0-9._-]+)/i)?.[1];
                const pass = limpo.match(/pass[\s:=]+([a-z0-9._-]+)/i)?.[1] || 
                            limpo.match(/password[=]+([a-z0-9._-]+)/i)?.[1];
                const exp = limpo.match(/(expira|vencimento|validade)[\s:=]+([0-9\/.\-]+)/i)?.[2];
                
                // Verifica URL completa
                const urlMatch = limpo.match(/get\.php\?username=([^\s&]+)&password=([^\s&]+)/i);
                
                if (urlMatch) {
                    return {
                        host: host || limpo.match(/(https?:\/\/[^\/]+)/i)?.[1],
                        user: urlMatch[1],
                        pass: urlMatch[2],
                        exp: exp || 'N/A'
                    };
                }
                
                if (host && user && pass) {
                    return { host, user, pass, exp: exp || 'N/A' };
                }
                
                return null;
            }).filter(Boolean);
        }

        // Gerar acesso
        function gerar() {
            if (state.creditos <= 0) {
                mostrarToast('❌ Sem créditos disponíveis!', true);
                return;
            }

            if (state.lista.length === 0) {
                mostrarToast('❌ Nenhum servidor disponível', true);
                return;
            }

            // Decrementa créditos
            state.creditos--;
            localStorage.setItem(CONFIG.STORAGE_KEY, state.creditos);
            atualizarDisplayCreditos();

            // Seleciona servidor aleatório
            const servidor = state.lista[Math.floor(Math.random() * state.lista.length)];
            
            // Constrói link
            state.currentLink = `${servidor.host}/get.php?username=${servidor.user}&password=${servidor.pass}&type=m3u_plus&output=ts`;

            // Exibe resultado
            exibirResultado(servidor);
        }

        function exibirResultado(servidor) {
            const output = document.getElementById('output');
            
            document.getElementById('linkText').textContent = state.currentLink;
            document.getElementById('detailUser').textContent = servidor.user;
            document.getElementById('detailPass').textContent = servidor.pass;
            document.getElementById('detailExp').textContent = servidor.exp;
            
            output.classList.add('active');
        }

        // Copiar link
        async function copiarLink() {
            if (!state.currentLink) return;
            
            try {
                await navigator.clipboard.writeText(state.currentLink);
                mostrarToast('✅ Link copiado!');
            } catch (err) {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = state.currentLink;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                mostrarToast('✅ Link copiado!');
            }
        }

        // Admin Panel - Acesso protegido por senha
        function setupAdminAccess() {
            let clickCount = 0;
            let lastClick = 0;
            
            // Acesso por 5 cliques rápidos no título
            document.querySelector('.title').addEventListener('click', (e) => {
                const now = Date.now();
                if (now - lastClick > 2000) clickCount = 0;
                
                clickCount++;
                lastClick = now;
                
                if (clickCount >= 5) {
                    document.getElementById('adminPanel').classList.add('active');
                    clickCount = 0;
                }
            });
        }

        function verificarAdmin() {
            const input = document.getElementById('adminPass').value;
            const errorDiv = document.getElementById('adminError');
            const creditControl = document.getElementById('creditControl');
            const btn = document.getElementById('adminBtn');
            
            if (input === CONFIG.ADMIN_PASSWORD) {
                state.isAdmin = true;
                errorDiv.style.display = 'none';
                creditControl.style.display = 'block';
                btn.textContent = 'ADICIONAR CRÉDITOS';
                btn.onclick = adicionarCreditos;
                mostrarToast('🔓 Acesso administrativo concedido');
            } else {
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            }
        }

        function adicionarCreditos() {
            const input = document.getElementById('addCredits');
            const valor = parseInt(input.value);
            
            if (isNaN(valor) || valor <= 0) {
                mostrarToast('❌ Valor inválido', true);
                return;
            }
            
            state.creditos += valor;
            localStorage.setItem(CONFIG.STORAGE_KEY, state.creditos);
            atualizarDisplayCreditos();
            
            input.value = '';
            mostrarToast(`✅ ${valor} créditos adicionados!`);
        }

        // Utilitários
        function atualizarDisplayCreditos() {
            document.getElementById('creditsDisplay').textContent = `CRÉDITOS: ${state.creditos}`;
            
            const btn = document.getElementById('generateBtn');
            if (state.creditos <= 0) {
                btn.disabled = true;
                btn.textContent = 'SEM CRÉDITOS';
            } else {
                btn.disabled = false;
                btn.textContent = 'GERAR ACESSO';
            }
        }

        function atualizarStatus(msg, isError = false) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.style.color = isError ? '#ff4444' : '#888';
        }

        function mostrarToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#ff4444' : '#00ff9c';
            toast.style.color = isError ? '#fff' : '#000';
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
