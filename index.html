<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APK BUGADO - VIP PAINEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #39ff14; --neon-purple: #bc13fe; --dark-bg: #050505; --card-bg: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--dark-bg); color: var(--neon-green); 
            font-family: 'Source Code Pro', monospace; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .main-wrapper { width: 95%; max-width: 450px; padding: 20px 0; }

        /* LOGO CRIADA POR CÓDIGO (CSS) - Resolve o erro da imagem que sumiu */
        .logo-css {
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid var(--neon-green); margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 0 25px var(--neon-green);
            background: radial-gradient(circle, #111 0%, #000 100%);
        }
        .logo-css::before {
            content: "VIP"; font-family: 'Orbitron'; font-size: 40px;
            color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green);
        }
        .logo-css::after {
            content: ""; position: absolute; inset: -10px;
            border: 2px dashed var(--neon-purple); border-radius: 50%;
            animation: rotate 10s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* BLOQUEIO E INTERFACE */
        #lock-section { text-align: center; padding: 25px; border: 1px solid #1a1a1a; border-radius: 15px; background: var(--card-bg); }
        input { 
            background: #000; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 15px; width: 100%; border-radius: 8px; text-align: center;
            font-family: 'Orbitron'; margin-bottom: 15px; outline: none; box-shadow: inset 0 0 5px var(--neon-green);
        }
        button { 
            width: 100%; padding: 15px; border-radius: 30px; font-family: 'Orbitron';
            font-weight: bold; cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase;
        }
        .btn-action { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }
        .btn-main { background: transparent; border: 1px solid var(--neon-purple); color: #fff; font-size: 9px; }

        /* CONTEÚDO DO PAINEL */
        #vip-content { display: none; width: 100%; margin-top: 20px; }
        .dashboard-card { 
            background: var(--card-bg); border: 1px solid var(--neon-purple);
            border-radius: 15px; padding: 20px; margin-top: 20px;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
        }
        .account-item { border-left: 3px solid var(--neon-green); background: #000; padding: 12px; margin-top: 15px; }
        .label { color: var(--neon-purple); font-size: 9px; font-weight: bold; display: block; }
        .value { color: #fff; font-size: 11px; word-break: break-all; }
        .status-bar { font-size: 10px; text-align: center; margin: 15px 0; color: #888; }
        .copy-btn { background: #111; border: 1px solid #333; color: var(--neon-green); font-size: 10px; padding: 10px; margin-top: 15px; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="logo-css"></div>
        <h2 style="font-family: 'Orbitron'; font-size: 18px; text-align:center; margin:0 0 20px 0;">[ VIP_PAINEL ]</h2>

        <div id="lock-section">
            <input type="password" id="mestre-key" placeholder="CHAVE DE ACESSO">
            <button class="btn-action" onclick="checkAccess()">DESBLOQUEAR SISTEMA</button>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-main" onclick="window.open('https://t.me/suporte')">💎 ENTRAR VIP</button>
                <button class="btn-main" onclick="window.open('https://t.me/canal')">📢 GRUPO</button>
            </div>
        </div>

        <div id="vip-content">
            <div class="status-bar" id="load-status">🟢 STATUS: PRONTO (CONECTADO)</div>
            <button class="btn-action" onclick="fetchList()">GERAR LISTA ATUALIZADA</button>
            <div id="accounts-display"></div>
        </div>
    </div>

<script>
    async function checkAccess() {
        const key = document.getElementById('mestre-key').value.trim();
        try {
            const res = await fetch(`config.json?v=${Date.now()}`); // Anti-cache
            const config = await res.json();
            if (config.access_keys.includes(key)) {
                document.getElementById('lock-section').style.display = 'none';
                document.getElementById('vip-content').style.display = 'block';
                fetchList();
            } else { alert("ACESSO NEGADO!"); }
        } catch (e) { alert("Erro de conexão!"); }
    }

    async function fetchList() {
        const display = document.getElementById('accounts-display');
        display.innerHTML = '<div class="status-bar">Limpando e Gerando novas contas...</div>';
        
        try {
            // O segredo para atualizar é esse "?v=" no final, força o navegador a ler o listas.txt novo
            const res = await fetch(`listas.txt?v=${Date.now()}`); 
            const data = await res.text();
            
            const blocks = data.split(/┏●|『|▬▬▬▬▬|🌐Host/).filter(b => b.includes('http'));
            display.innerHTML = ''; 

            blocks.forEach(block => {
                const host = block.match(/(?:http:\/\/[a-zA-Z0-9.-]+:[0-9]+)/i)?.[0];
                const user = block.match(/(?:Usuário|Usᴜᴀʀɪᴏ|👤Usuário)\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1];
                const pass = block.match(/(?:Senha|Sᴇɴʜᴀ|🔒Senha)\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1];
                const exp = block.match(/(?:Expira|Vᴇɴᴄɪᴍᴇɴᴛᴏ|⏳Expira)\s*►\s*([0-9\/.]+)/i)?.[1];

                if (host && user && pass) {
                    const link = `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=ts`;
                    display.innerHTML += `
                        <div class="dashboard-card">
                            <span style="float:right; color:var(--neon-green); font-size:9px;">● ONLINE</span>
                            <span class="label">💎 VIP APKBUGADO PREMIUM</span>
                            <div class="account-item">
                                <span class="label">🔗 URL M3U8:</span>
                                <span class="value" style="color:var(--neon-green)">${link}</span>
                            </div>
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <div style="flex:1"><span class="label">USER:</span><span class="value">${user}</span></div>
                                <div style="flex:1"><span class="label">PASS:</span><span class="value">${pass}</span></div>
                            </div>
                            <div style="margin-top:10px;">
                                <span class="label">📅 VENCIMENTO:</span>
                                <span class="value" style="color:yellow">${exp || '01/01/2027'}</span>
                            </div>
                            <button class="copy-btn" onclick="copy('${link}')">COPIAR ACESSO</button>
                        </div>
                    `;
                }
            });
        } catch (e) { display.innerHTML = '<p style="text-align:center">Erro ao carregar lista.</p>'; }
    }

    function copy(t) { navigator.clipboard.writeText(t); alert("Link Copiado!"); }
</script>
</body>
</html>
