<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador VIP IPTV</title><link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet"><style>
body{
background:#050505;
color:#fff;
font-family:'Inter';
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
max-width:420px;
width:100%;
background:#111;
padding:25px;
border-radius:20px;
box-shadow:0 0 50px #000;
}

.title{
text-align:center;
font-family:'Orbitron';
color:#00ff9c;
margin-bottom:20px;
}

/* LOGIN */
input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-bottom:10px;
background:#000;
color:#00ff9c;
text-align:center;
}

/* GRID */
.grid{
display:flex;
gap:10px;
margin-bottom:20px;
}

.btn{
flex:1;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.vip{background:#bc13fe;}
.free{background:#00d2ff;}
.main{background:#00ff9c;color:#000;}

.status{
text-align:center;
font-size:12px;
margin-top:10px;
color:#888;
}

#out{
display:none;
margin-top:15px;
padding:15px;
background:#0a0a0a;
border-radius:10px;
}

.link{
background:#000;
padding:10px;
border-radius:6px;
word-break:break-word;
color:#00ff9c;
}

.creditos{
text-align:center;
margin-top:10px;
color:#00ff9c;
}

.copy.done{
background:#00ff9c;
color:#000;
}
</style></head><body><div class="card"><div class="title">GERADOR VIP IPTV</div><!-- LOGIN --><div id="login">
<input type="password" id="senha" placeholder="DIGITE A CHAVE">
<button class="btn main" onclick="logar()">DESBLOQUEAR SISTEMA</button>
</div><!-- PAINEL --><div id="painel" style="display:none;"><div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
<button class="btn vip">💎 VIP</button></a><a href="https://t.me/ApkBugado" target="_blank">
<button class="btn free">📢 FREE</button></a>
</div><button class="btn main" onclick="gerar()">GERAR ACESSO</button>

<div class="creditos" id="creditos"></div><div class="status" id="status">Sistema ativo</div><div id="out"></div></div></div><script>

let lista=[];
let creditos=localStorage.getItem("creditos") || 20;

/* LOGIN */
async function logar(){
let senha=document.getElementById("senha").value.trim();

try{
let cfg=await (await fetch("config.json")).json();

if(cfg.access_keys.includes(senha)){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
carregar();
}else{
alert("ACESSO NEGADO");
}

}catch{
alert("ERRO CONFIG");
}
}

/* CARREGAR */
async function carregar(){

let t=await (await fetch("listas.txt?"+Date.now())).text();

let blocos=t.split(/┏|『/g);

lista=blocos.map(b=>{

b=b.normalize("NFD").replace(/[^\x00-\x7F]/g,"");

let host=b.match(/http:\/\/[^\s]+:\d+/i)?.[0];
let user=b.match(/user[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let pass=b.match(/pass[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let exp=b.match(/(expira|vencimento)[^0-9]*([0-9\/]+)/i)?.[2];

let m=b.match(/get\.php\?username=([^\s&]+)&password=([^\s&]+)/i);

if(m){
return {host,user:m[1],pass:m[2],exp};
}

if(host&&user&&pass){
return {host,user,pass,exp};
}

}).filter(x=>x);

document.getElementById("creditos").innerText="CRÉDITOS: "+creditos;

}

/* GERAR */
function gerar(){

if(creditos<=0){
alert("SEM CRÉDITOS");
return;
}

creditos--;
localStorage.setItem("creditos",creditos);
document.getElementById("creditos").innerText="CRÉDITOS: "+creditos;

let c=lista[Math.floor(Math.random()*lista.length)];

let link=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

let out=document.getElementById("out");

out.innerHTML=`
<b style="color:#bc13fe;">ACESSO LIBERADO</b><br><br>

<div class="link">${link}</div>

<br>USER: ${c.user}
<br>PASS: ${c.pass}

<br><br>VALIDADE: ${c.exp || "N/A"}

<button class="btn main copy" onclick="copiar('${link}', this)">COPIAR</button>
`;

out.style.display="block";
}

/* COPIAR */
function copiar(text,btn){
navigator.clipboard.writeText(text);
btn.innerText="COPIADO ✔";
btn.classList.add("done");

setTimeout(()=>{
btn.innerText="COPIAR";
btn.classList.remove("done");
},1500);
}

</script></body>
</html>
