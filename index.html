<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador VIP IPTV</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><style>
body{background:#050505;color:#fff;font-family:'Inter';display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;}
.card{width:100%;max-width:420px;background:#0d0d0d;padding:20px;border-radius:20px;}
.title{text-align:center;font-family:'Orbitron';color:#00ff9c;}
.subtitle{text-align:center;font-size:11px;color:#777;margin-bottom:10px;}
.input{width:100%;padding:14px;border-radius:12px;border:1px solid #222;background:#000;color:#00ff9c;text-align:center;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px;cursor:pointer;position:relative;overflow:hidden;}
.btn::before{content:"";position:absolute;left:-100%;top:0;width:100%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);}
.btn.wow::before{animation:shine 1s;}
@keyframes shine{0%{left:-100%}100%{left:100%}}
.vip{background:#bc13fe;}
.free{background:#00d2ff;}
.main{background:#00ff9c;color:#000;}
.grid{display:flex;gap:10px;}
.status{text-align:center;font-size:11px;color:#00ff9c;}
.progress{height:6px;background:#111;margin-top:10px;border-radius:10px;overflow:hidden;display:none;}
.progress span{display:block;height:100%;background:#00ff9c;width:0%;}
#out{display:none;margin-top:15px;}
.card-info{background:#111;padding:10px;border-radius:10px;margin-bottom:8px;}
.label{font-size:10px;color:#777;}
.value{word-break:break-word;}
</style></head><body><div class="card"><div class="title">GERADOR VIP IPTV</div>
<div class="subtitle" id="sub">Carregando...</div><div id="login">
<input type="password" class="input" id="senha" placeholder="Digite a chave">
<button class="btn main" onclick="logar()">Desbloquear</button>
</div><div id="painel" style="display:none;"><div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank"><button class="btn vip">VIP</button></a>
<a href="https://t.me/ApkBugado" target="_blank"><button class="btn free">FREE</button></a>
</div><button class="btn main" onclick="gerar()">GERAR ACESSO</button>
<button class="btn main" onclick="copiar()">COPIAR</button>

<div class="status" id="status"></div>
<div class="progress"><span id="bar"></span></div><div id="out"></div></div></div><script>

function limpar(t){
return t.normalize("NFKD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
}

let lista=[];
let usadas=[];
let memoria=JSON.parse(localStorage.getItem("hosts")||"{}");

/* LOGIN */
async function logar(){
let senha=document.getElementById("senha").value;
let cfg=await (await fetch("config.json")).json();
if(cfg.access_keys.includes(senha)){
login.style.display="none";
painel.style.display="block";
carregar();
}
}

/* CARREGAR */
async function carregar(){
let txt=await (await fetch("listas.txt?"+Date.now())).text();
let blocos=txt.split(/┏|『/g);

lista=blocos.map(b=>{

let host=b.match(/http:\/\/[^\s]+:\d+/i)?.[0];
let user=b.match(/user[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let pass=b.match(/pass[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];

let m=b.match(/username=([^\s&]+)&password=([^\s&]+)/i);
if(m){user=m[1];pass=m[2];}

/* DATA INTELIGENTE */
let exp=null;
let linhas=b.split("\n");

for(let l of linhas){
let c=limpar(l);

if(c.includes("scan")||c.includes("criado")||c.includes("dias")) continue;

if(c.includes("exp")||c.includes("venc")){
let m=l.match(/([0-9]{2}\/[0-9]{2}\/[0-9]{4})/);
if(m){exp=m[1];break;}
}
}

if(!exp){
let datas=[...b.matchAll(/([0-9]{2}\/[0-9]{2}\/[0-9]{4})/g)];
exp=datas.length?datas[datas.length-1][1]:null;
}

if(host&&user&&pass){
return {host,user,pass,exp};
}

}).filter(x=>x);

let hosts=[...new Set(lista.map(x=>x.host))];
sub.innerText=hosts.length+" hosts detectados";
}

/* TESTE */
async function testar(host){
try{
let r=await fetch(host,{method:"HEAD"});
return r.ok;
}catch{
return true;
}
}

/* IA SCORE */
function score(h){
let m=memoria[h]||{ok:0,fail:0};
return m.ok - m.fail;
}

/* GERAR */
async function gerar(){

let btn=document.querySelector(".main");
btn.classList.add("wow");

status.innerText="Conectando...";
document.querySelector(".progress").style.display="block";

let ordenada=[...lista].sort((a,b)=>score(b.host)-score(a.host));

let disponivel=ordenada.filter(x=>!usadas.includes(x.user));
if(disponivel.length==0){usadas=[];disponivel=ordenada;}

let c=disponivel[Math.floor(Math.random()*Math.min(5,disponivel.length))];

usadas.push(c.user);

bar.style.width="70%";

let link=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

let online=await testar(c.host);

/* salvar IA */
if(!memoria[c.host]) memoria[c.host]={ok:0,fail:0};
online?memoria[c.host].ok++:memoria[c.host].fail++;
localStorage.setItem("hosts",JSON.stringify(memoria));

bar.style.width="100%";

out.innerHTML=`
<div class="card-info"><div class="label">HOST</div><div class="value">${c.host}</div></div>
<div class="card-info"><div class="label">M3U</div><div class="value">${link}</div></div>
<div class="card-info"><div class="label">USER</div><div class="value">${c.user}</div></div>
<div class="card-info"><div class="label">PASS</div><div class="value">${c.pass}</div></div>
<div class="card-info"><div class="label">VALIDADE</div><div class="value">${c.exp||"Desconhecida"}</div></div>
<div class="card-info"><div class="label">STATUS</div><div class="value">${online?"🟢 ONLINE":"🔴 OFFLINE"}</div></div>
`;

out.style.display="block";
status.innerText="✔ Gerado";

setTimeout(()=>{
bar.style.width="0%";
document.querySelector(".progress").style.display="none";
btn.classList.remove("wow");
},800);

}

/* COPIAR */
function copiar(){
if(out.innerText){
navigator.clipboard.writeText(out.innerText);
status.innerText="✔ Copiado";
}
}

</script></body>
</html>
