<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador VIP IPTV</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><style>
body{
background:#060606;
color:#fff;
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
width:100%;
max-width:420px;
background:#111;
padding:25px;
border-radius:20px;
box-shadow:0 0 50px #000;
}

/* TÍTULO */
.title{
font-family:'Orbitron';
text-align:center;
font-size:18px;
color:#00ff9c;
margin-bottom:20px;
letter-spacing:2px;
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #222;
background:#000;
color:#00ff9c;
text-align:center;
margin-bottom:10px;
}

/* GRID */
.grid{
display:flex;
gap:10px;
margin-bottom:20px;
}

.grid a{flex:1;}

/* BOTÕES */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
font-size:12px;
transition:.2s;
}

.vip{background:linear-gradient(135deg,#bc13fe,#7a00aa);}
.free{background:linear-gradient(135deg,#00d2ff,#006a80);}
.main{background:linear-gradient(135deg,#00ff9c,#008f58);color:#000;}

.btn:hover{transform:scale(1.04);}

/* STATUS */
.status{
text-align:center;
font-size:11px;
color:#888;
margin-top:10px;
}

/* LOADING */
.loader{
height:4px;
background:#222;
border-radius:10px;
overflow:hidden;
display:none;
margin-top:10px;
}

.loader span{
display:block;
height:100%;
width:40%;
background:linear-gradient(90deg,#00ff9c,#00d2ff);
animation:load 1s infinite;
}

@keyframes load{
0%{margin-left:-40%;}
100%{margin-left:100%;}
}

/* RESULTADO */
#out{
display:none;
margin-top:20px;
padding:15px;
background:#0a0a0a;
border-radius:12px;
border:1px solid #222;
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.link{
background:#000;
padding:10px;
border-radius:8px;
color:#00ff9c;
word-break:break-word;
margin-top:5px;
}

/* COPY */
.copy.done{
background:#00ff9c;
color:#000;
}
</style></head><body><div class="card"><div class="title">GERADOR VIP IPTV</div><!-- LOGIN --><div id="login">
<input type="password" id="senha" placeholder="DIGITE A CHAVE">
<button class="btn main" onclick="logar()">DESBLOQUEAR SISTEMA</button>
</div><!-- PAINEL --><div id="painel" style="display:none;"><div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
<button class="btn vip">💎 GRUPO VIP</button></a><a href="https://t.me/ApkBugado" target="_blank">
<button class="btn free">📢 GRUPO FREE</button></a>
</div><button class="btn main" onclick="gerar()">GERAR ACESSO</button>

<div class="status" id="status">Sistema pronto</div><div class="loader" id="loader"><span></span></div><div id="out"></div></div></div><script>

let lista=[];

/* LOGIN */
async function logar(){

let senha=document.getElementById("senha").value.trim();

try{
let cfg=await (await fetch("config.json")).json();

if(cfg.access_keys.includes(senha)){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
carregar();
}else{
alert("ACESSO NEGADO");
}

}catch{
alert("Erro ao validar acesso");
}
}

/* CARREGAR LISTA */
async function carregar(){

let status=document.getElementById("status");

status.innerText="Sincronizando base...";

let t=await (await fetch("listas.txt?"+Date.now())).text();

let blocos=t.split(/┏|『/g);

lista=blocos.map(b=>{

b=b.normalize("NFD").replace(/[^\x00-\x7F]/g,"");

let host=b.match(/http:\/\/[^\s]+:\d+/i)?.[0];
let user=b.match(/user[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let pass=b.match(/pass[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let exp=b.match(/(expira|vencimento)[^0-9]*([0-9\/]+)/i)?.[2];

let m=b.match(/get\.php\?username=([^\s&]+)&password=([^\s&]+)/i);

if(m){
return {host,user:m[1],pass:m[2],exp};
}

if(host&&user&&pass){
return {host,user,pass,exp};
}

}).filter(x=>x);

status.innerText=lista.length+" contas disponíveis";
}

/* GERAR */
async function gerar(){

let out=document.getElementById("out");
let status=document.getElementById("status");
let loader=document.getElementById("loader");

if(lista.length==0){
status.innerText="Nenhuma conta carregada";
return;
}

/* RESET */
out.style.display="none";
out.innerHTML="";
loader.style.display="block";

/* PROCESSO */
status.innerText="Conectando...";
await delay(500);

status.innerText="Validando...";
await delay(500);

status.innerText="Gerando acesso...";
await delay(600);

/* GERAR */
let c=lista[Math.floor(Math.random()*lista.length)];

let link=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

out.innerHTML=`
<b style="color:#bc13fe;">ACESSO LIBERADO</b><br><br>

<div class="link">${link}</div>

<br>Usuário: ${c.user}
<br>Senha: ${c.pass}

<br><br>Validade: ${c.exp || "Não informada"}

<button class="btn main copy" onclick="copiar('${link}', this)">COPIAR</button>
`;

loader.style.display="none";
out.style.display="block";
status.innerText="Acesso pronto";

}

/* COPY */
function copiar(text,btn){
navigator.clipboard.writeText(text);
btn.innerText="COPIADO ✔";
btn.classList.add("done");

setTimeout(()=>{
btn.innerText="COPIAR";
btn.classList.remove("done");
},1500);
}

function delay(ms){
return new Promise(r=>setTimeout(r,ms));
}

</script></body>
</html>
