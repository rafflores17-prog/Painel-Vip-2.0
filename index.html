<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ULTRA PARSER V4 - AUTOMATIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #39ff14; --neon-purple: #bc13fe; --dark: #050505; }
        body { 
            background: var(--dark); color: var(--neon-green); 
            font-family: 'Source Code Pro', monospace; 
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        /* Estética Cyber Terminal */
        .terminal-container {
            border: 1px solid var(--neon-purple); padding: 20px;
            background: rgba(10, 10, 10, 0.9); box-shadow: 0 0 20px var(--neon-purple);
            max-width: 500px; width: 100%; border-radius: 10px;
        }
        .header-info { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .gen-status { color: #ffd700; font-family: 'Orbitron'; font-size: 14px; }
        .card-view { border-left: 4px solid var(--neon-green); padding: 15px; margin: 15px 0; background: #000; }
        .label { color: var(--neon-purple); font-size: 10px; display: block; margin-top: 10px; }
        .value { color: #fff; font-size: 14px; }
        .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1; padding: 12px; background: var(--neon-purple); border: none;
            color: white; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
        }
        button:hover { filter: brightness(1.3); box-shadow: 0 0 10px var(--neon-purple); }
        #lock-screen {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="terminal-container" style="text-align: center;">
            <h2 style="font-family: 'Orbitron';">SISTEMA BLOQUEADO</h2>
            <input type="password" id="pass" placeholder="CHAVE DE ACESSO" 
                   style="width:80%; padding:10px; margin:20px 0; background:transparent; border:1px solid var(--neon-green); color:var(--neon-green); text-align:center;">
            <button onclick="checkAccess()">DECODIFICAR</button>
        </div>
    </div>

    <div class="terminal-container">
        <div class="header-info">
            <h1 style="font-family: 'Orbitron'; font-size: 18px;">COMMAND CENTER V4</h1>
            <p class="gen-status">CONTA ATUAL: <span id="current-idx">1</span> / <span id="total-count">0</span></p>
        </div>

        <div id="display-card" class="card-view">
            Carregando banco de dados...
        </div>

        <div class="nav-btns">
            <button onclick="prev()">◄ ANTERIOR</button>
            <button onclick="next()">PRÓXIMO ►</button>
        </div>
    </div>

<script>
    let db = [];
    let currentIndex = 0;

    // Carrega a segurança e os dados via fetch (puxando os arquivos externos)
    async function checkAccess() {
        const passInput = document.getElementById('pass').value;
        try {
            const res = await fetch('config.json');
            const config = await res.json();
            
            if (config.access_keys.includes(passInput)) {
                document.getElementById('lock-screen').style.display = 'none';
                loadData();
            } else { alert("ACESSO NEGADO!"); }
        } catch (e) { alert("Erro ao carregar config.json"); }
    }

    async function loadData() {
        try {
            const res = await fetch('database.json');
            db = await res.json();
            document.getElementById('total-count').innerText = db.length;
            renderCard();
        } catch (e) { alert("Erro ao carregar database.json"); }
    }

    function renderCard() {
        if (db.length === 0) return;
        const item = db[currentIndex];
        const m3u = `${item.host}/get.php?username=${item.user}&password=${item.pass}&type=m3u_plus&output=ts`;
        
        document.getElementById('current-idx').innerText = currentIndex + 1;
        document.getElementById('display-card').innerHTML = `
            <span class="label">PORTAL / HOST</span>
            <span class="value">${item.host}</span>
            <span class="label">CREDENCIAIS</span>
            <span class="value">User: ${item.user} | Pass: ${item.pass}</span>
            <span class="label">VALIDADE</span>
            <span class="value">${item.exp}</span>
            <span class="label">LINK M3U8 COMPLETO</span>
            <div style="font-size:10px; color:#39ff14; margin-top:5px; word-break:break-all; border:1px dashed #333; padding:5px;">${m3u}</div>
            <button onclick="navigator.clipboard.writeText('${m3u}'); alert('Copiado!')" style="margin-top:10px; font-size:10px; padding:5px;">COPIAR M3U</button>
        `;
    }

    function next() { if (currentIndex < db.length - 1) { currentIndex++; renderCard(); } }
    function prev() { if (currentIndex > 0) { currentIndex--; renderCard(); } }
</script>
</body>
</html>
