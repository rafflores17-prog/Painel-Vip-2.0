<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESTRE | APK BUGADO - XTREAM PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a0033 0%, #050505 100%);
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* TELA DE LOGIN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .login-box {
            padding: 30px; border: 2px solid var(--neon-purple);
            border-radius: 15px; text-align: center;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.4);
            background: #0a0a0a;
        }

        .login-box h2 { font-family: 'Orbitron', sans-serif; color: var(--neon-green); margin-bottom: 20px; }

        input[type="password"] {
            background: #111; border: 1px solid var(--neon-purple);
            padding: 12px; color: var(--neon-green); border-radius: 5px;
            width: 100%; margin-bottom: 15px; outline: none; text-align: center;
        }

        /* HEADER */
        header {
            width: 100%; padding: 30px; text-align: center;
            border-bottom: 1px solid rgba(188, 19, 254, 0.3);
            display: none;
        }

        header h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }

        .btn-sync {
            margin-top: 15px; padding: 10px 25px; cursor: pointer;
            background: transparent; border: 1px solid var(--neon-purple);
            color: #fff; border-radius: 20px; font-weight: bold;
            transition: 0.3s;
        }

        .btn-sync:hover { background: var(--neon-purple); box-shadow: 0 0 20px var(--neon-purple); }

        /* GRID DE CARDS */
        .container {
            width: 100%; max-width: 1200px; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px; display: none;
        }

        .card {
            background: var(--card-bg); border: 1px solid #222;
            border-radius: 12px; padding: 20px; position: relative;
            transition: 0.3s; border-left: 4px solid var(--neon-purple);
        }

        .card:hover { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); }

        .status-on { position: absolute; top: 15px; right: 15px; font-size: 10px; background: var(--neon-green); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        .info-row { margin-bottom: 12px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; display: block; }
        .value { color: #ddd; font-size: 14px; word-break: break-all; }
        .value-green { color: var(--neon-green); }

        .copy-btn {
            width: 100%; padding: 10px; border: none; border-radius: 5px;
            background: linear-gradient(45deg, #4b0082, #bc13fe);
            color: white; font-family: 'Orbitron', sans-serif;
            font-size: 11px; cursor: pointer; margin-top: 10px;
        }

        /* MOBILE FIX */
        @media (max-width: 600px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>APK BUGADO</h2>
            <input type="password" id="pass-field" placeholder="SENHA DE ACESSO">
            <button class="btn-sync" onclick="login()">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <header id="header">
        <h1>COMMAND CENTER</h1>
        <button class="btn-sync" onclick="loadList()">🔄 SINCRONIZAR GITHUB</button>
    </header>

    <div class="container" id="cards-container">
        </div>

<script>
    // CONFIGURAÇÕES DO MESTRE
    const MINHA_SENHA = "123"; // Troque pela sua senha
    const GITHUB_RAW_URL = "SUA_URL_DO_GITHUB_AQUI"; // Ex: https://raw.githubusercontent.com/usuario/repo/main/listas.txt

    function login() {
        const input = document.getElementById('pass-field').value;
        if(input === MINHA_SENHA) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('header').style.display = 'block';
            document.getElementById('cards-container').style.display = 'grid';
            loadList(); // Carrega automático após login
        } else {
            alert("ACESSO NEGADO, MESTRE.");
        }
    }

    async function loadList() {
        const container = document.getElementById('cards-container');
        container.innerHTML = "<p style='color:var(--neon-green)'>Lendo dados do satélite...</p>";

        try {
            // Se você ainda não tem a URL do Github, vou simular com seus dados enviados
            const data = `COLE_AQUI_SEU_TEXTO_OU_USE_O_FETCH_ABAIXO`;
            
            // Caso queira usar o link real do Github:
            // const response = await fetch(GITHUB_RAW_URL);
            // const data = await response.text();

            // O motor que separa os blocos de texto
            const blocks = data.split('┏●-•~¹°”ˆ˜¨').filter(b => b.includes('Host'));
            container.innerHTML = ""; // Limpa o carregando

            blocks.forEach(block => {
                const host = block.match(/Host\s*►\s*(http:\/\/[a-zA-Z0-9.-]+:[0-9]+)/i)?.[1];
                const user = block.match(/Usuário\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1];
                const pass = block.match(/Senha\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1];
                const exp = block.match(/Expira\s*►\s*([0-9\/]+)/i)?.[1];

                if(host && user && pass) {
                    const m3uLink = `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=ts`;
                    
                    container.innerHTML += `
                        <div class="card">
                            <span class="status-on">ONLINE</span>
                            <div class="info-row">
                                <span class="label">Portal / Host</span>
                                <span class="value">${host}</span>
                            </div>
                            <div class="info-row">
                                <span class="label">Credenciais</span>
                                <span class="value">User: <span class="value-green">${user}</span></span>
                                <span class="value">Pass: <span class="value-green">${pass}</span></span>
                            </div>
                            <div class="info-row">
                                <span class="label">Vencimento Original</span>
                                <span class="value">${exp || 'Não informado'}</span>
                            </div>
                            <button class="copy-btn" onclick="copyToClipboard('${m3uLink}')">COPY M3U8 LINK</button>
                        </div>
                    `;
                }
            });

        } catch (error) {
            container.innerHTML = "<p style='color:red'>ERRO AO SINCRONIZAR COM GITHUB.</p>";
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert("Link M3U8 copiado com sucesso!");
    }
</script>
</body>
</html>
