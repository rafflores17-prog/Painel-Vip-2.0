<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APK BUGADO - COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-green: #00ff9c; 
            --neon-purple: #bc13fe; 
            --neon-blue: #00d2ff;
            --neon-yellow: #f9d423;
            --dark-bg: #050505;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--dark-bg); color: #fff;
            font-family: 'Share Tech Mono', monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
        }

        .card-painel {
            width: 100%; max-width: 420px; padding: 25px;
            border: 1px solid rgba(0, 255, 156, 0.2); border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,1), inset 0 0 15px rgba(0,255,156,0.1);
            text-align: center; background: #0a0a0a;
            position: relative; overflow: hidden;
        }

        /* LOGO VIP COM SCANNER */
        .logo-container { margin-bottom: 25px; position: relative; }
        .vip-ring {
            width: 110px; height: 110px; border-radius: 50%;
            border: 2px solid var(--neon-green); margin: 0 auto;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--neon-green), inset 0 0 10px var(--neon-green);
            position: relative;
        }
        .vip-ring::after {
            content: "VIP"; font-family: 'Orbitron'; font-size: 28px; 
            color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green);
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: var(--neon-purple); top: 0;
            box-shadow: 0 0 15px var(--neon-purple);
            animation: scanning 3s linear infinite; opacity: 0.7;
        }
        @keyframes scanning { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* BOTÕES 3D */
        .btn-3d {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; font-size: 12px;
            transition: all 0.1s ease; margin-bottom: 15px;
            display: inline-block; text-decoration: none; text-align: center;
        }

        .btn-green {
            background: linear-gradient(145deg, #00ff9c, #008f58);
            color: #000; box-shadow: 0 6px #005a38, 0 10px 20px rgba(0,255,156,0.3);
        }
        .btn-green:active { box-shadow: 0 2px #005a38; transform: translateY(4px); }

        .btn-purple {
            background: linear-gradient(145deg, #bc13fe, #7a00aa);
            color: #fff; box-shadow: 0 6px #520073, 0 10px 20px rgba(188,19,254,0.3);
        }
        .btn-purple:active { box-shadow: 0 2px #520073; transform: translateY(4px); }

        .links-topo { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-small { flex: 1; padding: 12px; font-size: 9px; margin-bottom: 0; }

        /* INPUT */
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #222;
            background: #000; color: var(--neon-green); text-align: center;
            font-size: 16px; margin-bottom: 15px; font-family: 'Share Tech Mono'; outline: none;
        }

        /* DISPLAY RESULTADO */
        #out {
            background: #020202; padding: 18px; margin-top: 20px;
            border-radius: 15px; font-size: 13px; text-align: left;
            border-left: 4px solid var(--neon-purple); display: none; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .label { color: #888; font-size: 10px; display: block; margin-top: 8px; text-transform: uppercase; }
        .val-host { color: var(--neon-blue); font-weight: bold; word-break: break-all; }
        .val-user { color: #fff; text-shadow: 0 0 5px #fff; }
        .val-pass { color: var(--neon-yellow); }
        .val-exp  { color: var(--neon-green); }

        .status-msg { margin-top: 15px; font-size: 11px; color: #555; height: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card-painel">
    <div style="color:var(--neon-green); font-size: 11px; letter-spacing: 3px; margin-bottom: 20px; font-family: 'Orbitron';">
        [ APK_BUGADO_SYSTEM ]
    </div>

    <div class="logo-container">
        <div class="vip-ring"><div class="scan-line"></div></div>
    </div>

    <div class="links-topo">
        <a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank" class="btn-3d btn-purple btn-small">💎 ENTRAR VIP</a>
        <a href="https://t.me/ApkBugado" target="_blank" class="btn-3d btn-green btn-small">📢 GRUPO FREE</a>
    </div>

    <div id="login-box">
        <input type="password" id="senhaInput" placeholder="INSIRA ACESSO MESTRE">
        <button class="btn-3d btn-green" onclick="validarAcesso()">DESBLOQUEAR SISTEMA</button>
    </div>

    <div id="painel" style="display:none;">
        <button id="btn-gerar" class="btn-3d btn-green" onclick="gerarAcesso()">ATIVAR ACESSO IPTV</button>
        <button class="btn-3d btn-purple" style="padding: 10px; font-size: 10px;" onclick="copiarDados()">COPIAR ACESSO COMPLETO</button>

        <div class="status-msg" id="status">SISTEMA AGUARDANDO...</div>
        <div id="out"></div>
    </div>
</div>

<script>
let listaContas = [];
let contasUsadas = [];
let emExecucao = false;

// 1. LOGIN CORRIGIDO (Lê a lista access_keys do seu JSON)
async function validarAcesso() {
    const input = document.getElementById('senhaInput').value.trim();
    const status = document.getElementById('status');
    
    try {
        const response = await fetch('config.json?v=' + Date.now());
        const config = await response.json();
        
        // AQUI ESTAVA O ERRO: Agora ele checa se o que você digitou está DENTRO da lista access_keys
        if(config.access_keys.includes(input)) {
            document.getElementById('login-box').style.display = "none";
            document.getElementById('painel').style.display = "block";
            status.textContent = "ACESSO AUTORIZADO! BEM-VINDO.";
            carregarDatabase();
        } else {
            alert("ACESSO NEGADO! SENHA INCORRETA.");
        }
    } catch (e) {
        alert("ERRO: O arquivo config.json não foi lido corretamente.");
    }
}

// 2. CARREGAR LISTAS
async function carregarDatabase() {
    try {
        const r = await fetch('listas.txt?v=' + Date.now());
        const t = await r.text();
        const blocos = t.split(/┏●|『|▬▬▬▬▬|🌐Host/).filter(b => b.includes('http'));
        
        listaContas = blocos.map(b => ({
            host: b.match(/(?:http:\/\/[a-zA-Z0-9.-]+:[0-9]+)/i)?.[0],
            user: b.match(/(?:Usuário|Usᴜᴀʀɪᴏ|👤Usuário|Usuário\s*►)\s*([a-zA-Z0-9._-]+)/i)?.[1],
            pass: b.match(/(?:Senha|Sᴇɴʜᴀ|🔒Senha|Senha\s*►)\s*([a-zA-Z0-9._-]+)/i)?.[1],
            exp: b.match(/(?:Expira|Vᴇɴᴄɪᴍᴇɴᴛᴏ|⏳Expira|Expira\s*►)\s*([0-9\/.]+)/i)?.[1]
        })).filter(a => a.host && a.user);
        
        document.getElementById('status').textContent = `DATABASE: ${listaContas.length} NODES PRONTOS`;
    } catch(e) { 
        document.getElementById('status').textContent = "ERRO NA DATABASE"; 
    }
}

// 3. GERAR ALEATÓRIO SEM REPETIR
async function gerarAcesso() {
    if(emExecucao || listaContas.length === 0) return;
    emExecucao = true;

    const out = document.getElementById('out');
    const status = document.getElementById('status');
    const btn = document.getElementById('btn-gerar');

    btn.disabled = true;
    out.style.display = "none";

    const fases = ["ESTABELECENDO CONEXÃO...", "DECODIFICANDO PROTOCOLOS...", "SINCRONIZANDO DATABASE...", "ACESSO CONCEDIDO!"];
    for(let f of fases) {
        status.innerHTML = `<span style="color:var(--neon-purple)">>></span> ${f}`;
        await new Promise(res => setTimeout(res, 500));
    }

    let disponiveis = listaContas.filter(c => !contasUsadas.includes(c.user));

    if(disponiveis.length === 0) {
        contasUsadas = []; // Reseta quando acabar
        disponiveis = listaContas;
    }

    const conta = disponiveis[Math.floor(Math.random() * disponiveis.length)];
    contasUsadas.push(conta.user);

    out.innerHTML = `
        <span style="color:var(--neon-purple); font-weight:bold; font-size:11px;">💎 VIP APKBUGADO PREMIUM</span><br>
        
        <span class="label">XTREAM HOST:</span>
        <span class="val-host">${conta.host}</span><br>
        
        <span class="label">USUÁRIO:</span>
        <span class="val-user">${conta.user}</span><br>
        
        <span class="label">SENHA:</span>
        <span class="val-pass">${conta.pass}</span><br>
        
        <span class="label">VENCIMENTO:</span>
        <span class="val-exp">${conta.exp || '20/12/2026'}</span>
    `;

    out.style.display = "block";
    status.innerHTML = `CONTA [${contasUsadas.length}/${listaContas.length}] EXTRAÍDA`;
    btn.disabled = false;
    emExecucao = false;
}

function copiarDados() {
    const out = document.getElementById('out');
    if(out.style.display === "block") {
        navigator.clipboard.writeText(out.innerText);
        alert("SISTEMA: DADOS COPIADOS!");
    }
}
</script>
</body>
</html>
