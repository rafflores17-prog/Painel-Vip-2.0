<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GERADOR VIP - APKBUGADO</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #0a0a0a; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #1a1a1a; }
        .title { color: #00ff88; text-align: center; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        
        /* LOGIN */
        #login-screen { text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: #00ff88; box-sizing: border-box; text-align: center; font-size: 16px; }
        
        /* PAINEL */
        #main-panel { display: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-main { background: #00ff88; color: #000; }
        
        /* RESULTADO ESTILO O QUE VOCÊ PEDIU */
        .box { background: #111; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #222; }
        .label { font-size: 10px; color: #0088cc; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        .val { font-size: 13px; word-break: break-all; color: #eee; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }
        
        .green { color: #00ff88; }
        .red { color: #ff4444; }
        #out { display: none; margin-top: 15px; }
        #loader { display: none; text-align: center; color: #00ff88; font-size: 14px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="title">ACESSO RESTRITO</div>
        <input type="password" id="keyInput" placeholder="Sua Chave Mestre">
        <button class="btn btn-main" onclick="validarChave()">ENTRAR NO PAINEL</button>
    </div>

    <div id="main-panel">
        <div class="title">GERADOR APKBUGADO</div>
        <button id="btnGerar" class="btn btn-main" onclick="gerar()">🚀 SORTEAR NOVO ACESSO</button>
        
        <div id="loader">⚡ PROCESSANDO...</div>

        <div id="out">
            </div>
    </div>
</div>

<script>
    // URL do seu GitHub
    const BASE_URL = "https://raw.githubusercontent.com/rafflores17-prog/Painel-Vip-2.0/main/";
    let contas = [];

    async function validarChave() {
        const input = document.getElementById("keyInput").value;
        try {
            const res = await fetch(BASE_URL + "config.json?" + Date.now());
            const config = await res.json();
            if (input === config.chave_mestre) {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-panel").style.display = "block";
                carregarLista();
            } else { alert("Chave incorreta!"); }
        } catch (e) { alert("Erro ao conectar ao servidor."); }
    }

    async function carregarLista() {
        try {
            const res = await fetch(BASE_URL + "lista.txt?" + Date.now());
            const data = await res.text();
            
            // EXPLICAÇÃO: O Regex abaixo ignora os símbolos e pega só o texto após a seta ►
            const blocos = data.split(/┏●/);
            contas = blocos.map(b => {
                const host = b.match(/Host\s*►\s*(https?:\/\/[^\s\n\r]+)/i);
                const user = b.match(/Usuário\s*►\s*([^\s\n\r]+)/i);
                const pass = b.match(/Senha\s*►\s*([^\s\n\r]+)/i);
                const exp  = b.match(/Expira\s*►\s*([^\s\n\r]+)/i);

                if (host && user && pass) {
                    return {
                        host: host[1].trim(),
                        user: user[1].trim(),
                        pass: pass[1].trim(),
                        exp:  exp ? exp[1].trim() : "Não informada"
                    };
                }
                return null;
            }).filter(c => c !== null);
        } catch (e) { console.error("Erro na carga"); }
    }

    function gerar() {
        if (contas.length === 0) return;
        
        document.getElementById("out").style.display = "none";
        document.getElementById("loader").style.display = "block";

        setTimeout(async () => {
            const c = contas[Math.floor(Math.random() * contas.length)];
            const m3u = `${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;
            
            // Teste Online/Offline
            let status = "🟢 ONLINE";
            let cor = "green";
            try {
                const check = await fetch(c.host, { method: 'HEAD', mode: 'no-cors' });
            } catch(e) { status = "🔴 OFFLINE"; cor = "red"; }

            const out = document.getElementById("out");
            out.innerHTML = `
                <div class="box">
                    <div class="label">HOST</div>
                    <div class="val">${c.host}</div>
                </div>
                <div class="box">
                    <div class="label">M3U</div>
                    <div class="val green">${m3u}</div>
                </div>
                <div class="row">
                    <div class="box col">
                        <div class="label">LOGIN</div>
                        <div class="val">${c.user}</div>
                    </div>
                    <div class="box col">
                        <div class="label">SENHA</div>
                        <div class="val">${c.pass}</div>
                    </div>
                </div>
                <div class="row">
                    <div class="box col">
                        <div class="label">VALIDADE</div>
                        <div class="val">${c.exp}</div>
                    </div>
                    <div class="box col">
                        <div class="label">STATUS</div>
                        <div class="val ${cor}">${status}</div>
                    </div>
                </div>
            `;
            
            document.getElementById("loader").style.display = "none";
            out.style.display = "block";
        }, 1000);
    }
</script>
</body>
</html>
