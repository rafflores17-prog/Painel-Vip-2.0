<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR VIP IPTV</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

body{
background:#050505;
color:#fff;
font-family:'Share Tech Mono', monospace;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#0a0a0a;
padding:20px;
border-radius:20px;
box-shadow:0 0 40px #000;
margin-top:-60px;
}

.title{
text-align:center;
font-family:'Orbitron';
color:#00ff9c;
margin-bottom:10px;
}

/* LOGIN */
input{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #111;
background:#000;
color:#00ff9c;
text-align:center;
}

/* BOTÕES */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.main{
background:linear-gradient(135deg,#00ff9c,#008f58);
color:#000;
}

.vip{
background:linear-gradient(135deg,#bc13fe,#7a00aa);
color:#fff;
}

.free{
background:linear-gradient(135deg,#00d2ff,#006a80);
color:#fff;
}

.grid{
display:flex;
gap:10px;
}

/* TERMINAL */
.status{
margin-top:15px;
font-size:12px;
background:#000;
padding:10px;
border-radius:10px;
height:120px;
overflow-y:auto;
color:#00ff9c;
}

/* RESULT */
#out{
display:none;
margin-top:15px;
}

.box{
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.label{
font-size:10px;
color:#777;
}

.val{
font-size:13px;
word-break:break-word;
}

.green{color:#00ff9c;}

</style>
</head>

<body>

<div class="card">

<div class="title">GERADOR VIP IPTV</div>

<div id="login">
<input type="password" id="senha" placeholder="Digite a chave">
<button class="btn main" onclick="logar()">DESBLOQUEAR</button>
</div>

<div id="painel" style="display:none;">

<div class="grid">
<a href="#"><button class="btn vip">💎 GRUPO VIP</button></a>
<a href="#"><button class="btn free">📢 GRUPO FREE</button></a>
</div>

<button class="btn main" onclick="gerar(this)">🚀 GERAR ACESSO</button>
<button class="btn main" onclick="copiar()">📋 COPIAR</button>

<div class="status" id="status"></div>
<div id="out"></div>

</div>
</div>

<script>

let lista=[
{host:"http://server1.com:80",user:"user123",pass:"pass123"},
{host:"http://server2.com:80",user:"user456",pass:"pass456"}
];

/* LOGIN FAKE PRA TESTE */
function logar(){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
status.innerHTML="";
}

/* ESCREVE NO TERMINAL */
async function linha(texto){
status.innerHTML += texto + "<br>";
status.scrollTop = status.scrollHeight;
await new Promise(r=>setTimeout(r,400));
}

/* GERAR */
async function gerar(btn){

btn.disabled=true;
status.innerHTML="";
out.style.display="none";

await linha("🔍 Conectando servidor...");
await linha("📡 Estabelecendo conexão...");
await linha("🔐 Descriptografando dados...");
await linha("🧠 Analisando base...");
await linha("⚡ Buscando listas online...");
await linha("📦 Processando dados...");
await linha("✅ Concluído");

let c=lista[Math.floor(Math.random()*lista.length)];

let m3u=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

out.innerHTML=`
<div class="box">
<div class="label">🔗 M3U</div>
<div class="val green">${m3u}</div>
</div>
`;

out.style.display="block";

btn.disabled=false;
}

/* COPIAR */
function copiar(){
navigator.clipboard.writeText(out.innerText);
status.innerHTML+="✔ Copiado<br>";
}

</script>

</body>
</html>
