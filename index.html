<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR VIP IPTV PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{background:#050505;color:#fff;font-family:'Share Tech Mono', monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:10px;}
.card{width:100%;max-width:420px;background:#0a0a0a;padding:20px;border-radius:20px;box-shadow:0 0 40px #000;border:1px solid #1a1a1a;}
.title{text-align:center;font-family:'Orbitron';color:#00ff9c;margin-bottom:20px;}
input{width:100%;padding:15px;border-radius:12px;border:1px solid #111;background:#000;color:#00ff9c;text-align:center;margin-bottom:10px;}
.btn{width:100%;padding:15px;border:none;border-radius:12px;cursor:pointer;margin-top:10px;font-family:'Orbitron';}
.vip{background:#bc13fe;}
.free{background:#00d2ff;}
.main{background:#00ff9c;color:#000;}
.status{margin-top:10px;font-size:11px;background:#000;padding:12px;border-radius:10px;height:90px;overflow-y:auto;}
#out{display:none;margin-top:15px;}
.box{background:#111;padding:12px;border-radius:10px;margin-bottom:8px;}
.label{font-size:10px;}
.val{font-size:13px;word-break:break-all;}
.row{display:flex;gap:10px;}
.col{flex:1;}
</style>
</head>

<body>
<div class="card">

<div class="title">GERADOR VIP IPTV PRO</div>

<div id="login">
<input type="password" id="senha" placeholder="CHAVE">
<button class="btn main" onclick="logar()">ENTRAR</button>
</div>

<div id="painel" style="display:none;">

<button class="btn main" id="btnGerar" onclick="startGerar()">GERAR</button>
<button class="btn" onclick="copiar()">COPIAR</button>

<div class="status" id="statusLog">Aguardando...</div>
<div id="out"></div>

</div>
</div>

<script>

// ================= VARIÁVEIS =================
let listaContas = [];
let processando = false;

// ================= LOGIN =================
async function logar(){
    const senha = document.getElementById("senha").value;

    let r = await fetch("config.json");
    let cfg = await r.json();

    if(senha === cfg.chave_mestre){
        document.getElementById("login").style.display="none";
        document.getElementById("painel").style.display="block";
        carregarLista();
    } else {
        alert("Senha errada");
    }
}

// ================= LISTA =================
async function carregarLista(){

    let r = await fetch("https://raw.githubusercontent.com/rafflores17-prog/Painel-Vip-2.0/main/listas.txt");
    let txt = await r.text();

    let blocos = txt.split(/━|┏|─/);

    listaContas = [];

    blocos.forEach(b => {

        let host = b.match(/Host.*?(https?:\/\/[^\s]+)/i);
        let user = b.match(/Usu[aá]rio.*?(\d+)/i);
        let pass = b.match(/Senha.*?(\d+)/i);
        let validade = b.match(/Expira.*?([0-9\/:\s]+)/i);

        if(host && user && pass){

            // ignora lixo
            if(host[1].includes("t.me")) return;

            listaContas.push({
                host: host[1],
                user: user[1],
                pass: pass[1],
                validade: validade ? validade[1] : "NÃO INFORMADA"
            });
        }
    });

    document.getElementById("statusLog").innerHTML =
    "✔ "+listaContas.length+" contas carregadas";
}

// ================= GERAR =================
function startGerar(){

    if(processando || listaContas.length === 0) return;

    processando = true;

    let log = document.getElementById("statusLog");
    log.innerHTML = "";

    let etapas = [
        "Escaneando...",
        "Testando...",
        "Validando...",
        "Finalizando..."
    ];

    let i = 0;

    let interval = setInterval(()=>{
        if(i < etapas.length){
            log.innerHTML += etapas[i]+"<br>";
            i++;
        } else {
            clearInterval(interval);
            exibir();
        }
    }, 400);
}

// ================= RESULTADO =================
function exibir(){

    let c = listaContas[Math.floor(Math.random()*listaContas.length)];

    let m3u = c.host+"/get.php?username="+c.user+"&password="+c.pass+"&type=m3u_plus&output=ts";

    document.getElementById("out").innerHTML = `
    <div class="box"><div class="label">STATUS</div><div class="val">ONLINE</div></div>
    <div class="box"><div class="label">M3U</div><div class="val" id="copy-target">${m3u}</div></div>
    <div class="box"><div class="label">HOST</div><div class="val">${c.host}</div></div>
    <div class="row">
    <div class="box col"><div class="label">USER</div><div class="val">${c.user}</div></div>
    <div class="box col"><div class="label">PASS</div><div class="val">${c.pass}</div></div>
    </div>
    <div class="box"><div class="label">VALIDADE</div><div class="val">${c.validade}</div></div>
    `;

    document.getElementById("out").style.display="block";
    document.getElementById("btnGerar").innerText="GERAR";
    processando = false;
}

// ================= COPIAR =================
function copiar(){
    let t = document.getElementById("copy-target");
    if(!t) return alert("Gere primeiro");

    navigator.clipboard.writeText(t.innerText);
    alert("Copiado");
}

</script>
</body>
</html>
