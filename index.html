<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR VIP IPTV</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet"><style>

body{
background:#050505;
color:#fff;
font-family:'Share Tech Mono', monospace;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
width:100%;
max-width:420px;
background:#0a0a0a;
padding:20px;
border-radius:20px;
box-shadow:0 0 40px #000;
}

.title{
text-align:center;
font-family:'Orbitron';
color:#00ff9c;
margin-bottom:10px;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #111;
background:#000;
color:#00ff9c;
text-align:center;
}

/* BOTÕES */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
position:relative;
overflow:hidden;
transition:.2s;
}

.btn:active{transform:scale(0.95);}

.btn::before{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
}

.btn.anim::before{
animation:shine 1s linear;
}

@keyframes shine{
0%{left:-100%;}
100%{left:100%;}
}

.vip{
background:linear-gradient(135deg,#bc13fe,#7a00aa);
}

.free{
background:linear-gradient(135deg,#00d2ff,#006a80);
}

.main{
background:linear-gradient(135deg,#00ff9c,#008f58);
color:#000;
}

.grid{
display:flex;
gap:10px;
}

.status{
text-align:center;
font-size:12px;
color:#00ff9c;
margin-top:10px;
min-height:20px;
}

/* RESULT */
#out{
display:none;
margin-top:15px;
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.box{
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.label{
font-size:10px;
color:#777;
}

.val{
font-size:13px;
word-break:break-word;
}

.green{color:#00ff9c;}
.blue{color:#00d2ff;}
.white{color:#fff;}
.purple{color:#bc13fe;}

.row{
display:flex;
gap:10px;
}

.col{
flex:1;
}

</style></head><body><div class="card"><div class="title">GERADOR VIP IPTV</div><div id="login">
<input type="password" id="senha" placeholder="Digite a chave">
<button class="btn main" onclick="logar()">DESBLOQUEAR</button>
</div><div id="painel" style="display:none;"><div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
<button class="btn vip">💎 GRUPO VIP</button></a><a href="https://t.me/ApkBugado" target="_blank">
<button class="btn free">📢 GRUPO FREE</button></a>
</div><button class="btn main" onclick="gerar()">🚀 GERAR ACESSO</button>
<button class="btn main" onclick="copiar()">📋 COPIAR</button>

<div class="status" id="status"></div>
<div id="out"></div></div></div><script>

let lista=[];

/* LOGIN */
async function logar(){
try{
let senha=document.getElementById("senha").value.trim();
let cfg=await (await fetch("config.json?"+Date.now())).json();

if(cfg.access_keys.includes(senha)){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
carregar();
}else alert("Senha inválida");

}catch{
alert("Erro config.json");
}
}

/* CARREGAR */
async function carregar(){

let txt=await (await fetch("listas.txt?"+Date.now())).text();

let blocos=txt.split(/┏|『/g);

lista=blocos.map(b=>{

let host=b.match(/http:\/\/[^\s]+:\d+/i)?.[0];
let user=b.match(/user[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let pass=b.match(/pass[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];

let m=b.match(/username=([^\s&]+)&password=([^\s&]+)/i);
if(m){user=m[1];pass=m[2];}

let exp=null;
let linhas=b.split("\n");

for(let l of linhas){
let c=l.toLowerCase();
if(c.includes("scan")||c.includes("dias")||c.includes("criado")) continue;

if(c.includes("exp")||c.includes("venc")){
let d=l.match(/([0-9]{2}\/[0-9]{2}\/[0-9]{4})/);
if(d){exp=d[1];break;}
}
}

if(host&&user&&pass){
return {host,user,pass,exp};
}

}).filter(x=>x);

status.innerText="✔ Sistema pronto";
}

/* SCAN REAL */
async function gerar(){

let btn=document.querySelector(".main");
btn.classList.add("anim");

out.style.display="none";

let etapas=[
"🔍 Conectando servidor...",
"📡 Estabelecendo conexão...",
"🔐 Descriptografando dados...",
"🧠 Analisando base...",
"⚡ Gerando acesso..."
];

for(let i=0;i<etapas.length;i++){
status.innerText=etapas[i];
await new Promise(r=>setTimeout(r,400));
}

let c=lista[Math.floor(Math.random()*lista.length)];

let m3u=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

out.innerHTML=`

<div class="box">
<div class="label">🔗 M3U</div>
<div class="val green">${m3u}</div>
</div>

<div class="box">
<div class="label">🌐 HOST</div>
<div class="val blue">${c.host}</div>
</div>

<div class="row">

<div class="box col">
<div class="label">👤 LOGIN</div>
<div class="val white">${c.user}</div>
</div>

<div class="box col">
<div class="label">🔑 SENHA</div>
<div class="val white">${c.pass}</div>
</div>

</div>

<div class="row">

<div class="box col">
<div class="label">📅 VALIDADE</div>
<div class="val purple">${c.exp||"Desconhecida"}</div>
</div>

<div class="box col">
<div class="label">📡 STATUS</div>
<div class="val green">🟢 ONLINE</div>
</div>

</div>

`;

out.style.display="block";
status.innerText="✅ Acesso gerado";

btn.classList.remove("anim");

}

/* COPIAR */
function copiar(){
navigator.clipboard.writeText(out.innerText);
status.innerText="✔ Copiado";
}

</script></body>
</html>
