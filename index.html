<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR VIP IPTV PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{background:#050505;color:#fff;font-family:'Share Tech Mono', monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding: 10px;}
.card{width:100%;max-width:420px;background:#0a0a0a;padding:20px;border-radius:20px;box-shadow:0 0 40px #000;border: 1px solid #1a1a1a;box-sizing: border-box;}
.title{text-align:center;font-family:'Orbitron';color:#00ff9c;margin-bottom:20px;text-transform: uppercase; font-size: 1.1rem; letter-spacing: 1px;}
input{width:100%;padding:15px;border-radius:12px;border:1px solid #111;background:#000;color:#00ff9c;text-align:center;box-sizing: border-box; font-size: 18px; margin-bottom: 10px; outline: none;}
.btn{width:100%;padding:15px;border:none;border-radius:12px;cursor:pointer;font-weight:bold;margin-top:10px; transition: 0.3s; font-family: 'Orbitron'; text-transform: uppercase;}
.vip{background:linear-gradient(135deg,#bc13fe,#7a00aa); color: #fff;}
.free{background:linear-gradient(135deg,#00d2ff,#006a80); color: #fff;}
.main{background:linear-gradient(135deg,#00ff9c,#008f58);color:#000;}
.grid{display:flex;gap:10px; margin-bottom: 10px;}
.status{margin-top:10px;font-size:11px;background:#000;padding:12px;border-radius:10px;height:90px;overflow-y:auto;color:#00ff9c; border: 1px solid #111; line-height: 1.5;}

#contagemHosts{font-size: 11px; color: #00ff9c; text-align: right; margin-top: 8px; text-transform: uppercase; font-weight: bold; text-shadow: 0 0 8px #00ff9c;}
#ads-area{margin:15px 0; text-align:center; min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
#out{display:none;margin-top:15px; animation: fadeIn 0.5s;}

.box{background:#111;padding:12px;border-radius:10px;margin-bottom:8px; border: 1px solid #222;}
.label{font-size:10px; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; display: flex; align-items: center; gap: 5px;}
.val{font-size:13px;word-break:break-all; font-family: 'Share Tech Mono';}
.green{color: #00ff9c;} .blue{color: #00d2ff;} .white{color: #ffffff;} .purple{color: #bc13fe;}
.row{display:flex;gap:10px;} .col{flex:1;}
a{text-decoration: none; flex: 1;}
@keyframes fadeIn { from{opacity:0; transform: translateY(10px);} to{opacity:1; transform: translateY(0);} }
</style>
</head>

<body>
<div class="card">
    <div class="title">GERADOR VIP IPTV PRO</div>

    <div id="login">
        <input type="password" id="senha" placeholder="CHAVE DE ACESSO">
        <button class="btn main" onclick="logar()">ENTRAR NO PAINEL</button>

        <div style="margin-top: 25px; border-top: 1px solid #222; padding-top: 15px;">
            <p style="text-align: center; color: #888; font-size: 12px; margin-top: 0; margin-bottom: 12px;">
                Não possui chave de acesso?
            </p>
            <div class="grid">
                <a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
                    <button class="btn vip">💎 ADQUIRIR VIP</button>
                </a>
                <a href="https://t.me/ApkBugado" target="_blank">
                    <button class="btn free">📢 GRUPO FREE</button>
                </a>
            </div>
        </div>
    </div>

    <div id="painel" style="display:none;">
        <button class="btn main" id="btnGerar" onclick="startGerar()">🚀 GERAR ACESSO</button>
        <button class="btn main" onclick="copiar()" style="background: #333; color: #fff;">📋 COPIAR DADOS</button>

        <div class="status" id="statusLog">Aguardando comando...</div>
        <div id="contagemHosts"></div>
        
        <div id="ads-area">
            <script type="text/javascript">
                atOptions = {'key' : '714f9e613ed8e8cf70c650639f2379da','format' : 'iframe','height' : 50,'width' : 320,'params' : {}};
            </script>
            <script src="https://encouragingjawsordinarily.com/714f9e613ed8e8cf70c650639f2379da/invoke.js"></script>
        </div>

        <div id="out"></div>
    </div>
</div>

<script>
let listaContas = [];
let processando = false;
let adsAberto = false;

async function logar(){
    const inputSenha = document.getElementById("senha").value.trim();
    try {
        const response = await fetch('config.json?' + Date.now());
        const config = await response.json();
        if(inputSenha === config.chave_mestre) {
            document.getElementById("login").style.display="none";
            document.getElementById("painel").style.display="block";
            carregarLista();
        } else { alert("Chave VIP incorreta!"); }
    } catch(e) { alert("Erro ao carregar config.json"); }
}

async function carregarLista(){
    const log = document.getElementById("statusLog");
    const countDiv = document.getElementById("contagemHosts");
    try {
        let r = await fetch("https://raw.githubusercontent.com/rafflores17-prog/Painel-Vip-2.0/main/listas.txt?" + Date.now());
        let txt = await r.text();
        
        // Split flexível para aceitar os diferentes separadores do arquivo
        let blocos = txt.split(/(?:┏●|━──────|─•~¹°)/).filter(b => b.includes("Host") || b.includes("ʜᴏsᴛ"));
        
        listaContas = blocos.map(b => {
            // Captura Hosts, Usuários e Senhas mesmo com fontes diferentes (ʜᴏsᴛ, ᴜsᴜᴀʀɪᴏ) ou emojis
            let h = b.match(/(?:Host|ʜᴏsᴛ|🌐\s*Host)\s*(?:►|:|➨)\s*(https?:\/\/[^\s\n\r]+)/i);
            let u = b.match(/(?:Usuário|ᴜsᴜᴀʀɪᴏ|👤\s*ᴜsᴜᴀʀɪᴏ|👤\s*Usuário)\s*(?:►|:|➨)\s*([^\s\n\r]+)/i);
            let p = b.match(/(?:Senha|sᴇɴʜᴀ|🔑\s*sᴇɴʜᴀ|🔐\s*Senha|🔒\s*Senha)\s*(?:►|:|➨)\s*([^\s\n\r]+)/i);
            let v = b.match(/(?:Validade|Expira|ᴇxᴘɪʀᴀ|📅\s*ᴇxᴘɪʀᴀ|⏳\s*Expira)\s*(?:►|:|➨)\s*([^\s\n\r]+)/i);

            if(h && u && p) {
                return { 
                    host: h[1].trim().replace(/\/$/, ""), 
                    user: u[1].trim(), 
                    pass: p[1].trim(),
                    validade: v ? v[1].trim() : "ILIMITADA"
                };
            }
        }).filter(x => x);

        const servidoresUnicos = [...new Set(listaContas.map(item => item.host))];
        log.innerHTML = `✔ Sistema pronto!<br>✔ ${listaContas.length} contas carregadas.`;
        countDiv.innerHTML = servidoresUnicos.length + " SERVIDORES ÚNICOS ATIVOS"; 
    } catch(e) { 
        log.innerHTML = "❌ Erro ao ler listas.txt."; 
    }
}

function startGerar(){
    if(processando || listaContas.length === 0) return;
    processando = true;
    document.getElementById("out").style.display = "none"; 
    document.getElementById("btnGerar").innerText = "⏳ PROCESSANDO...";
    
    if(!adsAberto) {
        const urlAds = "https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507";
        const a = document.createElement("a");
        a.href = urlAds;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.click();
        adsAberto = true;
    }
    
    let s = document.getElementById("statusLog");
    s.innerHTML = "";
    let etapas = ["🔍 Localizando host...", "📡 Extraindo credenciais...", "🔐 Validando acesso...", "⚡ Gerando Link M3U...", "✅ Concluído!"];
    let i = 0;
    let interval = setInterval(() => {
        if(i < etapas.length){
            s.innerHTML += etapas[i] + "<br>";
            i++;
        } else {
            clearInterval(interval);
            exibirResultado();
        }
    }, 400);
}

function exibirResultado(){
    let out = document.getElementById("out");
    let c = listaContas[Math.floor(Math.random() * listaContas.length)];
    let m3u = `${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

    out.innerHTML = `
        <div class="box"><div class="label blue">🔗 LINK M3U</div><div class="val green" id="copy-target">${m3u}</div></div>
        <div class="box"><div class="label blue">🌐 HOST</div><div class="val white">${c.host}</div></div>
        <div class="row">
            <div class="box col"><div class="label blue">👤 USUÁRIO</div><div class="val white">${c.user}</div></div>
            <div class="box col"><div class="label blue">🔑 SENHA</div><div class="val white">${c.pass}</div></div>
        </div>
        <div class="box"><div class="label blue">📅 VALIDADE</div><div class="val purple">${c.validade}</div></div>
    `;
    out.style.display = "block";
    document.getElementById("btnGerar").innerText = "🚀 GERAR ACESSO";
    processando = false;
}

function copiar(){
    let target = document.getElementById("copy-target");
    if(!target) return alert("Gere um acesso primeiro!");
    const temp = document.createElement('textarea');
    temp.value = target.innerText;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);
    alert("Copiado com sucesso!");
}
</script>
</body>
</html>
