<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR VIP IPTV</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@300;500&display=swap" rel="stylesheet"><style>

body{
background:#050505;
color:#fff;
font-family:'Inter';
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
width:100%;
max-width:420px;
background:#0d0d0d;
padding:20px;
border-radius:20px;
box-shadow:0 0 40px #000;
}

.title{
font-family:'Orbitron';
text-align:center;
color:#00ff9c;
margin-bottom:5px;
}

.subtitle{
text-align:center;
font-size:11px;
color:#666;
margin-bottom:15px;
}

/* LOGIN CORRIGIDO */
#login{
width:100%;
display:flex;
flex-direction:column;
gap:10px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #222;
background:#000;
color:#00ff9c;
text-align:center;
}

/* BOTÕES */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
position:relative;
overflow:hidden;
margin-top:10px;
}

.btn:active{transform:scale(0.95);}

.btn::before{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
}

.btn.wow::before{
animation:shine 1s linear;
}

@keyframes shine{
0%{left:-100%;}
100%{left:100%;}
}

/* VIP FREE */
.grid{
display:flex;
gap:15px;
margin-bottom:15px;
}

.vip{
flex:1;
background:linear-gradient(135deg,#bc13fe,#7a00aa);
}

.free{
flex:1;
background:linear-gradient(135deg,#00d2ff,#006a80);
}

/* MAIN */
.main{
background:linear-gradient(135deg,#00ff9c,#008f58);
color:#000;
}

/* STATUS */
.status{
text-align:center;
font-size:11px;
color:#00ff9c;
min-height:18px;
font-family:'Orbitron';
}

/* RESULT */
#out{
display:none;
margin-top:15px;
}

.card-info{
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.label{
font-size:10px;
color:#777;
}

.value{
font-size:13px;
word-break:break-word;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style></head><body><div class="card"><div class="title">GERADOR VIP IPTV</div>
<div class="subtitle" id="sub">Aguardando login...</div><div id="login">
<input type="password" id="senha" placeholder="Digite a chave">
<button class="btn main" onclick="logar()">DESBLOQUEAR</button>
</div><div id="painel" style="display:none;"><div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
<button class="btn vip">💎 VIP</button></a><a href="https://t.me/ApkBugado" target="_blank">
<button class="btn free">📢 FREE</button></a>
</div><button class="btn main" onclick="gerar()">🚀 GERAR</button>
<button class="btn main" onclick="copiar()">📋 COPIAR</button>

<div class="status" id="status"></div>
<div id="out"></div></div></div><script>

let lista=[];
let usadas=[];
let memoria=JSON.parse(localStorage.getItem("hosts")||"{}");

/* LOGIN CORRIGIDO */
async function logar(){

try{

let senha = document.getElementById("senha").value.trim();

let r = await fetch("config.json?"+Date.now());

if(!r.ok) throw "erro";

let cfg = await r.json();

if(cfg.access_keys.includes(senha)){
    
    document.getElementById("login").style.display="none";
    document.getElementById("painel").style.display="block";
    
    document.getElementById("sub").innerText="Carregando contas...";
    
    await carregar();

}else{
    alert("Senha inválida");
}

}catch(e){
alert("Erro ao carregar config.json");
console.log(e);
}

}

/* CARREGAR */
async function carregar(){

let txt=await (await fetch("listas.txt?"+Date.now())).text();

let blocos=txt.split(/┏|『/g);

lista=blocos.map(b=>{

let host=b.match(/http:\/\/[^\s]+:\d+/i)?.[0];
let user=b.match(/user[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let pass=b.match(/pass[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];

let m=b.match(/username=([^\s&]+)&password=([^\s&]+)/i);
if(m){user=m[1];pass=m[2];}

let exp=null;
let linhas=b.split("\n");

for(let l of linhas){
let c=l.toLowerCase();
if(c.includes("scan")||c.includes("criado")||c.includes("dias")) continue;

if(c.includes("exp")||c.includes("venc")){
let m=l.match(/([0-9]{2}\/[0-9]{2}\/[0-9]{4})/);
if(m){exp=m[1];break;}
}
}

if(host&&user&&pass){
return {host,user,pass,exp};
}

}).filter(x=>x);

let hosts=[...new Set(lista.map(x=>x.host))];
document.getElementById("sub").innerText=hosts.length+" hosts detectados";

}

/* GERAR */
async function gerar(){

let btn=document.querySelector(".main");
btn.classList.add("wow");

let c=lista[Math.floor(Math.random()*lista.length)];

let link=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

out.innerHTML=`
<div class="card-info"><div class="label">HOST</div><div class="value">${c.host}</div></div>
<div class="card-info"><div class="label">M3U</div><div class="value">${link}</div></div>
<div class="card-info"><div class="label">USER</div><div class="value">${c.user}</div></div>
<div class="card-info"><div class="label">PASS</div><div class="value">${c.pass}</div></div>
<div class="card-info"><div class="label">VALIDADE</div><div class="value">${c.exp||"Desconhecida"}</div></div>
`;

out.style.display="block";

setTimeout(()=>btn.classList.remove("wow"),500);

}

/* COPIAR */
function copiar(){
if(out.innerText){
navigator.clipboard.writeText(out.innerText);
status.innerText="Copiado!";
}
}

</script></body>
</html>
