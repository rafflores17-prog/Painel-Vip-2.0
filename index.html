<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador VIP IPTV</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><style>

body{
background:#050505;
color:#fff;
font-family:'Inter';
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
overflow:hidden;
}

.card{
width:100%;
max-width:420px;
background:#0d0d0d;
padding:20px;
border-radius:20px;
box-shadow:0 0 60px #000;
position:relative;
}

.title{
text-align:center;
font-family:'Orbitron';
color:#00ff9c;
margin-bottom:20px;
letter-spacing:2px;
text-shadow:0 0 10px #00ff9c;
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #222;
background:#000;
color:#00ff9c;
text-align:center;
margin-bottom:12px;
}

/* GRID */
.grid{
display:flex;
gap:12px;
margin-bottom:20px;
}

.grid a{flex:1;}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:600;
font-size:12px;
transition:.2s;
position:relative;
overflow:hidden;
}

.btn::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,#fff,transparent);
opacity:.2;
animation:shine 2s infinite;
}

@keyframes shine{
100%{left:100%;}
}

.vip{
background:linear-gradient(135deg,#bc13fe,#7a00aa);
box-shadow:0 0 15px #bc13fe;
}

.free{
background:linear-gradient(135deg,#00d2ff,#006a80);
box-shadow:0 0 15px #00d2ff;
}

.main{
background:linear-gradient(135deg,#00ff9c,#008f58);
color:#000;
box-shadow:0 0 15px #00ff9c;
}

.status{
text-align:center;
font-size:11px;
color:#aaa;
margin-top:10px;
min-height:16px;
}

/* PROGRESS */
.progress{
height:6px;
background:#111;
border-radius:10px;
overflow:hidden;
margin-top:10px;
display:none;
}

.progress span{
display:block;
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff9c,#00d2ff);
transition:width .3s;
}

/* RESULT */
#out{
display:none;
margin-top:20px;
}

.card-info{
background:#121212;
padding:12px;
border-radius:12px;
margin-bottom:10px;
border:1px solid #1f1f1f;
opacity:0;
transform:translateY(10px);
animation:fadeUp .4s forwards;
}

.card-info:nth-child(1){animation-delay:.1s;}
.card-info:nth-child(2){animation-delay:.2s;}
.card-info:nth-child(3){animation-delay:.3s;}
.card-info:nth-child(4){animation-delay:.4s;}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

.label{
font-size:9px;
color:#777;
margin-bottom:4px;
}

.value{
font-size:13px;
font-weight:600;
word-break:break-word;
}

.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.copy.done{
background:#00ff9c;
color:#000;
}

</style></head><body><div class="card"><div class="title">GERADOR VIP IPTV</div><div id="login">
<input type="password" id="senha" placeholder="DIGITE A CHAVE">
<button class="btn main" onclick="logar()">DESBLOQUEAR SISTEMA</button>
</div><div id="painel" style="display:none;"><div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
<button class="btn vip">💎 VIP</button></a><a href="https://t.me/ApkBugado" target="_blank">
<button class="btn free">📢 FREE</button></a>
</div><button class="btn main" onclick="gerar()">GERAR ACESSO</button>

<div class="status" id="status"></div><div class="progress" id="progress"><span id="bar"></span></div><div id="out"></div></div></div><script>

let lista=[];
let usadas=[];
let ultimoHost=null;

async function logar(){
let senha=document.getElementById("senha").value.trim();
let cfg=await (await fetch("config.json")).json();

if(cfg.access_keys.includes(senha)){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
carregar();
}else{
alert("ACESSO NEGADO");
}
}

function parseData(d){
if(!d) return 0;
let p=d.split("/");
return new Date(p[2],p[1]-1,p[0]).getTime();
}

async function carregar(){
let t=await (await fetch("listas.txt?"+Date.now())).text();
let blocos=t.split(/┏|『/g);

lista=blocos.map(b=>{
b=b.normalize("NFD").replace(/[^\x00-\x7F]/g,"");

let host=b.match(/http:\/\/[^\s]+:\d+/i)?.[0];
let user=b.match(/user[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let pass=b.match(/pass[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let exp=b.match(/(expira|vencimento)[^0-9]*([0-9\/]+)/i)?.[2];

let m=b.match(/get\.php\?username=([^\s&]+)&password=([^\s&]+)/i);

if(m){return {host,user:m[1],pass:m[2],exp};}
if(host&&user&&pass){return {host,user,pass,exp};}

}).filter(x=>x);

lista.sort((a,b)=>parseData(b.exp)-parseData(a.exp));

let hosts=[...new Set(lista.map(x=>x.host))];
digitar("✔ "+hosts.length+" hosts carregados");
}

async function gerar(){

let out=document.getElementById("out");
let bar=document.getElementById("bar");
let progress=document.getElementById("progress");

out.style.display="none";
progress.style.display="block";

await etapa("🔎 Analisando base",20);
await etapa("🌐 Conectando servidor",45);
await etapa("🔐 Gerando credenciais",70);

let disponiveis=lista.filter(x=>!usadas.includes(x.user));
if(disponiveis.length==0){usadas=[];disponiveis=lista;}

let filtrado=disponiveis.filter(x=>x.host!==ultimoHost);
if(filtrado.length==0) filtrado=disponiveis;

let c=filtrado[Math.floor(Math.random()*filtrado.length)];
usadas.push(c.user);
ultimoHost=c.host;

let link=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

await etapa("📡 Testando conexão",100);

let online=await testar(link);
let statusOnline=online?"🟢 ONLINE":"🔴 OFFLINE";

out.innerHTML=`
<div style="text-align:center;color:#bc13fe;margin-bottom:10px;">
ACESSO LIBERADO
</div>

<div class="card-info">
<div class="label">HOST</div>
<div class="value" style="color:#00d2ff;">${c.host}</div>
</div>

<div class="card-info">
<div class="label">M3U</div>
<div class="value" style="color:#00ff9c;">${link}</div>
</div>

<div class="grid-2">
<div class="card-info">
<div class="label">USER</div>
<div class="value" style="color:#00ff9c;">${c.user}</div>
</div>

<div class="card-info">
<div class="label">PASS</div>
<div class="value" style="color:#f9d423;">${c.pass}</div>
</div>

<div class="card-info">
<div class="label">VALIDADE</div>
<div class="value" style="color:#bc13fe;">${c.exp||"N/A"}</div>
</div>

<div class="card-info">
<div class="label">STATUS</div>
<div class="value">${statusOnline}</div>
</div>
</div>

<button class="btn main copy" onclick="copiar('${link}',this)">COPIAR</button>
`;

progress.style.display="none";
out.style.display="block";

}

/* animações */
function etapa(txt,percent){
return new Promise(r=>{
digitar(txt);
document.getElementById("bar").style.width=percent+"%";
setTimeout(r,800);
});
}

function digitar(txt){
let el=document.getElementById("status");
el.innerText="";
let i=0;
let t=setInterval(()=>{
el.innerText+=txt[i];
i++;
if(i>=txt.length) clearInterval(t);
},20);
}

async function testar(link){
try{
let r=await fetch(link,{method:"HEAD"});
return r.status==200;
}catch{return false;}
}

function copiar(text,btn){
navigator.clipboard.writeText(text);
btn.innerText="COPIADO ✔";
btn.classList.add("done");

setTimeout(()=>{
btn.innerText="COPIAR";
btn.classList.remove("done");
},1500);
}

</script></body>
</html>
