<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR VIP IPTV</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
background:#050505;
color:#fff;
font-family:'Share Tech Mono', monospace;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#0a0a0a;
padding:20px;
border-radius:20px;
box-shadow:0 0 40px #000;
}

.title{
text-align:center;
font-family:'Orbitron';
color:#00ff9c;
margin-bottom:10px;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #111;
background:#000;
color:#00ff9c;
text-align:center;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.main{
background:linear-gradient(135deg,#00ff9c,#008f58);
color:#000;
}

.grid{
display:flex;
gap:10px;
}

.status{
margin-top:15px;
font-size:12px;
background:#000;
padding:10px;
border-radius:10px;
height:120px;
overflow-y:auto;
color:#00ff9c;
}

#out{
display:none;
margin-top:15px;
}

.box{
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.label{font-size:10px;color:#777;}
.val{font-size:13px;word-break:break-word;}
.green{color:#00ff9c;}
</style>
</head>

<body>

<div class="card">

<div class="title">GERADOR VIP IPTV</div>

<div id="login">
<input type="password" id="senha" placeholder="Digite a chave">
<button class="btn main" onclick="logar()">DESBLOQUEAR</button>
</div>

<div id="painel" style="display:none;">

<button class="btn main" onclick="gerar()">🚀 GERAR ACESSO</button>

<div class="status" id="status"></div>
<div id="out"></div>

</div>
</div>

<script>

let lista=[];

/* LOGIN */
async function logar(){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
carregar();
}

/* CARREGAR (SIMPLES) */
async function carregar(){
let txt=await (await fetch("listas.txt?"+Date.now())).text();

lista = txt.split("\n").map(l=>{
let m=l.match(/(http[^\s]+).*username=([^\s&]+).*password=([^\s&]+)/i);
if(m){
return {host:m[1].split("/get")[0],user:m[2],pass:m[3]};
}
}).filter(x=>x);

status.innerHTML="✔ Sistema pronto<br>";
}

/* SCAN VISUAL */
async function fakeScan(){

status.innerHTML="";

let etapas=[
"🔍 Conectando servidor...",
"📡 Estabelecendo conexão...",
"🔐 Descriptografando dados...",
"🧠 Analisando base...",
"⚡ Buscando listas online...",
"📦 Processando dados...",
"✅ Concluído"
];

for(let e of etapas){
status.innerHTML += e + "<br>";
status.scrollTop = status.scrollHeight;
await new Promise(r=>setTimeout(r,500));
}

}

/* GERAR (SEPARADO DO SCAN) */
async function gerar(){

out.style.display="none";

/* RODA SCAN PRIMEIRO */
await fakeScan();

/* AGORA GERA */
let c=lista[Math.floor(Math.random()*lista.length)];

let m3u=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

out.innerHTML=`
<div class="box">
<div class="label">🔗 M3U</div>
<div class="val green">${m3u}</div>
</div>
`;

out.style.display="block";

status.innerHTML += "🚀 Acesso liberado<br>";
}

</script>

</body>
</html>
