<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAINEL VIP IPTV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --card: #13131d;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== LOGIN ===== */
  #tela-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, #1e0a3c 0%, var(--bg) 60%);
  }

  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 60px #7c3aed22;
  }

  .login-logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-title {
    font-size: 26px;
    font-weight: 900;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 32px;
  }

  .login-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 2px;
    transition: border-color .2s;
  }
  .login-input:focus { border-color: var(--accent2); }

  .btn-entrar {
    width: 100%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity .2s, transform .1s;
    margin-bottom: 16px;
  }
  .btn-entrar:hover { opacity: .9; }
  .btn-entrar:active { transform: scale(.98); }

  .login-erro {
    color: var(--red);
    font-size: 13px;
    min-height: 18px;
    margin-top: 4px;
  }

  /* ===== PAINEL ===== */
  #tela-painel { display: none; }

  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-logo {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 3px;
    color: var(--accent2);
  }

  .topbar-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
  }
  .stat-pill span { color: var(--text); }

  .btn-sair {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
  }
  .btn-sair:hover { border-color: var(--red); color: var(--red); }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* ===== GERAR CONTA ===== */
  .gerar-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .btn-gerar {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-gerar:hover { transform: translateY(-1px); box-shadow: 0 8px 24px #7c3aed44; }
  .btn-gerar:active { transform: scale(.98); }
  .btn-gerar:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* ===== CONTA CARD ===== */
  .conta-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-top: 20px;
    display: none;
    animation: fadeUp .3s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(8px); }
    to { opacity:1; transform: translateY(0); }
  }

  .conta-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .conta-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }
  .dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red); }

  .conta-index {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .campos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .campo {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .campo-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .campo-valor {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .btn-copiar {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 12px;
    flex-shrink: 0;
    transition: color .2s;
  }
  .btn-copiar:hover { color: var(--accent2); }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .info-chip {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }

  .info-chip .num {
    font-size: 18px;
    font-weight: 900;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
  }

  .info-chip .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .btn-copiar-tudo {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all .2s;
    margin-top: 8px;
  }
  .btn-copiar-tudo:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ===== LOADING ===== */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #ffffff44;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg {
    font-size: 13px;
    color: var(--muted);
    margin-top: 12px;
    min-height: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ===== HISTORICO ===== */
  .hist-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }

  .hist-lista { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

  .hist-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    transition: border-color .2s;
  }
  .hist-item:hover { border-color: var(--accent); }

  .hist-cred {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .hist-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .hist-badge.ok { background: #22c55e22; color: var(--green); }
  .hist-badge.fail { background: #ef444422; color: var(--red); }

  .hist-vazio {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 24px 0;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    z-index: 999;
    transition: transform .3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media(max-width:600px){
    .login-box { padding: 36px 24px; }
    .topbar-stats { display: none; }
    .campos-grid { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<!-- ===== TELA LOGIN ===== -->
<div id="tela-login">
  <div class="login-box">
    <div class="login-logo">🛰 IPTV</div>
    <div class="login-title">PAINEL VIP PRO</div>
    <input type="password" id="input-senha" class="login-input"
      placeholder="🔐 Chave de acesso"
      autocomplete="off"
      onkeydown="if(event.key==='Enter') entrar()">
    <button class="btn-entrar" onclick="entrar()">ENTRAR NO PAINEL</button>
    <div class="login-erro" id="erro-login"></div>
  </div>
</div>

<!-- ===== TELA PAINEL ===== -->
<div id="tela-painel">
  <div class="topbar">
    <div class="topbar-logo">⚡ VIP PRO</div>
    <div class="topbar-stats">
      <div class="stat-pill">Total: <span id="stat-total">0</span></div>
      <div class="stat-pill">Geradas: <span id="stat-geradas">0</span></div>
    </div>
    <button class="btn-sair" onclick="sair()">SAIR</button>
  </div>

  <div class="container">

    <!-- GERAR -->
    <div class="gerar-section">
      <div class="section-title">🎲 Gerar Conta</div>
      <button class="btn-gerar" id="btn-gerar" onclick="gerarConta()">
        <span>GERAR CONTA ALEATÓRIA</span>
      </button>
      <div class="status-msg" id="status-msg"></div>

      <!-- CARD RESULTADO -->
      <div class="conta-card" id="conta-card">
        <div class="conta-header">
          <div class="conta-status">
            <div class="dot" id="dot-status"></div>
            <span id="txt-status">ONLINE</span>
          </div>
          <div class="conta-index" id="txt-index">#0 de 0</div>
        </div>

        <div class="campos-grid">
          <div class="campo">
            <div class="campo-label">Host</div>
            <div class="campo-valor">
              <span id="val-host">—</span>
              <button class="btn-copiar" onclick="copiar('val-host')">📋</button>
            </div>
          </div>
          <div class="campo">
            <div class="campo-label">Usuário</div>
            <div class="campo-valor">
              <span id="val-user">—</span>
              <button class="btn-copiar" onclick="copiar('val-user')">📋</button>
            </div>
          </div>
          <div class="campo">
            <div class="campo-label">Senha</div>
            <div class="campo-valor">
              <span id="val-pass">—</span>
              <button class="btn-copiar" onclick="copiar('val-pass')">📋</button>
            </div>
          </div>
          <div class="campo">
            <div class="campo-label">Validade</div>
            <div class="campo-valor">
              <span id="val-exp">—</span>
            </div>
          </div>
          <div class="campo">
            <div class="campo-label">Dias restantes</div>
            <div class="campo-valor">
              <span id="val-restam">—</span>
            </div>
          </div>
          <div class="campo">
            <div class="campo-label">Conexões</div>
            <div class="campo-valor">
              <span id="val-cons">—</span>
            </div>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-chip">
            <div class="num" id="val-canais">—</div>
            <div class="lbl">📺 Canais</div>
          </div>
          <div class="info-chip">
            <div class="num" id="val-filmes">—</div>
            <div class="lbl">🎥 Filmes</div>
          </div>
          <div class="info-chip">
            <div class="num" id="val-series">—</div>
            <div class="lbl">🎬 Séries</div>
          </div>
        </div>

        <button class="btn-copiar-tudo" onclick="copiarTudo()">📋 COPIAR CREDENCIAIS COMPLETAS</button>
      </div>
    </div>

    <!-- HISTÓRICO -->
    <div class="hist-section">
      <div class="section-title">🕓 Histórico da sessão</div>
      <div class="hist-lista" id="hist-lista">
        <div class="hist-vazio">Nenhuma conta gerada ainda.</div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const CHAVE = "VIP1950@";
const LISTA_URL = "https://raw.githubusercontent.com/rafflores17-prog/Painel-Vip-2.0/main/listas.txt";

// ===== STATE =====
let contas = [];
let historico = [];
let contaAtual = null;
let gerando = false;

// ===== LOGIN =====
function entrar() {
  const senha = document.getElementById("input-senha").value.trim();
  const erro = document.getElementById("erro-login");
  if (!senha) { erro.textContent = "Digite a chave de acesso."; return; }
  if (senha !== CHAVE) { erro.textContent = "❌ Chave incorreta."; return; }
  erro.textContent = "";
  document.getElementById("tela-login").style.display = "none";
  document.getElementById("tela-painel").style.display = "block";
  carregarLista();
}

function sair() {
  document.getElementById("tela-painel").style.display = "none";
  document.getElementById("tela-login").style.display = "flex";
  document.getElementById("input-senha").value = "";
  contas = [];
  historico = [];
}

// ===== PARSER =====
function parsarLista(txt) {
  const resultado = [];
  // Divide em blocos pelo marcador de início
  const blocos = txt.split(/(?=╭─➤)/);

  let blocoAtual = {};

  for (let bloco of blocos) {
    bloco = bloco.trim();
    if (!bloco) continue;

    const pegar = (regex) => {
      const m = bloco.match(regex);
      return m ? m[1].trim() : null;
    };

    const host    = pegar(/Host\s*[➤►:=]+\s*(https?:\/\/[^\s\n\r]+)/i);
    const user    = pegar(/User\s*[➤►:=]+\s*([^\s\n\r|`*╰╭├●]+)/i);
    const pass    = pegar(/Pass\s*[➤►:=]+\s*([^\s\n\r|`*╰╭├●]+)/i);
    const exp     = pegar(/Exp\s*[➤►:=]+\s*([^\n\r╰╭├●]+)/i);
    const restam  = pegar(/Restam\s*[➤►:=]+\s*([^\n\r╰╭├●]+)/i);
    const conMax  = pegar(/Con\s*Max\s*[➤►:=]+\s*([^\s\n\r╰╭├●]+)/i);
    const conAct  = pegar(/Con\s*Act\s*[➤►:=]+\s*([^\s\n\r╰╭├●]+)/i);
    const status  = pegar(/Status\s*[➤►:=]+\s*([^\s\n\r╰╭├●]+)/i);
    const canais  = pegar(/Canais\s*[➤►:=]+\s*([^\s\n\r╰╭├●]+)/i);
    const filmes  = pegar(/Filmes\s*[➤►:=]+\s*([^\s\n\r╰╭├●]+)/i);
    const series  = pegar(/Series\s*[➤►:=]+\s*([^\s\n\r╰╭├●]+)/i);
    const m3u     = pegar(/Lista\s*M3u\s*[➤►:=]+\s*(https?:\/\/[^\s\n\r]+)/i);

    if (host && user && pass) {
      resultado.push({ host: host.replace(/\/$/, ""), user, pass,
        exp: exp || "?", restam: restam || "?",
        conMax: conMax || "1", conAct: conAct || "0",
        status: status || "Active",
        canais: canais || "?", filmes: filmes || "?", series: series || "?",
        m3u: m3u || `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=ts`
      });
    }
  }
  return resultado;
}

// ===== CARREGAR LISTA =====
async function carregarLista() {
  setStatus("⏳ Carregando lista...");
  try {
    const r = await fetch(LISTA_URL + "?t=" + Date.now());
    if (!r.ok) throw new Error("HTTP " + r.status);
    const txt = await r.text();
    contas = parsarLista(txt);
    if (contas.length === 0) throw new Error("Nenhuma conta encontrada no arquivo.");
    document.getElementById("stat-total").textContent = contas.length;
    setStatus(`✅ ${contas.length} contas carregadas. Clique em GERAR.`);
  } catch(e) {
    setStatus("❌ Erro ao carregar lista: " + e.message);
  }
}

// ===== GERAR CONTA =====
async function gerarConta() {
  if (gerando || contas.length === 0) return;
  gerando = true;
  const btn = document.getElementById("btn-gerar");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span><span>GERANDO...</span>';

  const idx = Math.floor(Math.random() * contas.length);
  const c = contas[idx];
  contaAtual = c;

  setStatus("🔍 Verificando conta " + (idx + 1) + "...");

  // Preenche card imediatamente
  document.getElementById("val-host").textContent  = c.host;
  document.getElementById("val-user").textContent  = c.user;
  document.getElementById("val-pass").textContent  = c.pass;
  document.getElementById("val-exp").textContent   = c.exp;
  document.getElementById("val-restam").textContent= c.restam;
  document.getElementById("val-cons").textContent  = `${c.conAct} / ${c.conMax}`;
  document.getElementById("val-canais").textContent= c.canais;
  document.getElementById("val-filmes").textContent= c.filmes;
  document.getElementById("val-series").textContent= c.series;
  document.getElementById("txt-index").textContent = `#${idx+1} de ${contas.length}`;
  document.getElementById("conta-card").style.display = "block";

  // Atualiza status/dot
  setOnline(c.status === "Active" || c.status === "active");

  setStatus(`✅ Conta #${idx+1} carregada.`);

  // Historico
  const j = { user: c.user, host: c.host, status: c.status };
  historico.unshift(j);
  document.getElementById("stat-geradas").textContent = historico.length;
  renderHistorico();

  btn.disabled = false;
  btn.innerHTML = '<span>GERAR NOVA CONTA</span>';
  gerando = false;
}

function setOnline(online) {
  const dot = document.getElementById("dot-status");
  const txt = document.getElementById("txt-status");
  dot.className = "dot" + (online ? "" : " offline");
  txt.textContent = online ? "ONLINE" : "OFFLINE";
  txt.style.color = online ? "var(--green)" : "var(--red)";
}

function setStatus(msg) {
  document.getElementById("status-msg").textContent = msg;
}

// ===== HISTÓRICO =====
function renderHistorico() {
  const el = document.getElementById("hist-lista");
  if (historico.length === 0) {
    el.innerHTML = '<div class="hist-vazio">Nenhuma conta gerada ainda.</div>';
    return;
  }
  el.innerHTML = historico.map((h, i) => `
    <div class="hist-item">
      <div class="hist-cred">${h.user} @ ${h.host}</div>
      <div class="hist-badge ${h.status === 'Active' ? 'ok' : 'fail'}">${h.status}</div>
    </div>
  `).join("");
}

// ===== COPIAR =====
function copiar(id) {
  const txt = document.getElementById(id).textContent;
  navigator.clipboard.writeText(txt).then(() => toast("Copiado!"));
}

function copiarTudo() {
  if (!contaAtual) return;
  const c = contaAtual;
  const txt =
`🛰 CONTA IPTV VIP
🌐 Host: ${c.host}
👤 User: ${c.user}
🔑 Pass: ${c.pass}
📆 Exp: ${c.exp}
⏳ Restam: ${c.restam}
👪 Con Max: ${c.conMax}
📺 Canais: ${c.canais}
🎥 Filmes: ${c.filmes}
🎬 Séries: ${c.series}
