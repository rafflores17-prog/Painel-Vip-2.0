<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GERADOR VIP - APKBUGADO</title>
    <style>
        :root { --primary: #00ff88; --bg: #050505; --card: #0f0f0f; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; padding: 15px; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #1a1a1a; }
        .title { color: var(--primary); text-align: center; font-weight: bold; margin: 15px 0; text-transform: uppercase; }
        
        /* ESPAÇO PARA SEUS ADS */
        .ad-container { margin: 10px 0; text-align: center; min-height: 50px; background: #000; border-radius: 8px; overflow: hidden; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-top { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff; font-size: 12px; }
        .btn-vip { background: #8a2be2; }
        .btn-free { background: #1e90ff; }
        
        .btn-main { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        #logs { background: #000; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; color: var(--primary); margin-bottom: 10px; border: 1px solid #111; min-height: 60px; }
        
        .box-info { background: #141414; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #0088cc; }
        .label { font-size: 10px; color: #0088cc; font-weight: bold; margin-bottom: 4px; }
        .val { font-size: 12px; color: #eee; word-break: break-all; }
        
        #login-screen { text-align: center; padding: 30px 10px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--primary); border-radius: 8px; text-align: center; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="title">ACESSO RESTRITO</div>
        <input type="password" id="keyInput" placeholder="Sua Senha">
        <button class="btn-main" onclick="entrar()">ENTRAR</button>
    </div>

    <div id="main-panel" style="display:none">
        <div class="title">GERADOR APKBUGADO</div>

        <div class="ad-container">
            <script type="text/javascript">
                atOptions = { 'key' : 'a8a116d252f41a02d16bcf030d61ce58', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
            </script>
            <script type="text/javascript" src="//encouragingjawsordinarily.com/invoke.js"></script>
        </div>

        <div class="btn-group">
            <button class="btn-top btn-vip" onclick="window.open('https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507')">💎 GRUPO VIP</button>
            <button class="btn-top btn-free">📢 GRUPO FREE</button>
        </div>

        <button class="btn-main" id="btnGerar" onclick="gerar()">🚀 GERAR NOVO ACESSO</button>

        <div class="ad-container">
             <a href="https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507" target="_blank" style="color: #444; text-decoration: none; font-size: 10px;">ANÚNCIO: CLIQUE AQUI PARA APOIAR</a>
        </div>

        <div id="logs">⚠️ Aguardando Login...</div>

        <div id="resultado" style="display:none">
            <div class="box-info"><div class="label">M3U</div><div id="res-m3u" class="val" style="color:var(--primary)"></div></div>
            <div style="display:flex; gap:8px;">
                <div class="box-info" style="flex:1"><div class="label">USUÁRIO</div><div id="res-u" class="val"></div></div>
                <div class="box-info" style="flex:1"><div class="label">SENHA</div><div id="res-p" class="val"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const GITHUB_RAW = "https://raw.githubusercontent.com/rafflores17-prog/Painel-Vip-2.0/main/lista.txt";
    let database = [];

    async function entrar() {
        const pass = document.getElementById("keyInput").value;
        if(pass === "1234") { // Troque pela sua senha do config.json se preferir
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-panel").style.display = "block";
            loadLista();
        } else { alert("Senha Incorreta!"); }
    }

    async function loadLista() {
        const logs = document.getElementById("logs");
        try {
            // Uso de Proxy para evitar o erro do print (CORS)
            const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(GITHUB_RAW + "?" + Date.now());
            const res = await fetch(proxy);
            const data = await res.json();
            const content = data.contents;
            
            const blocos = content.split(/┏●/);
            database = blocos.map(b => {
                const h = b.match(/Host\s*►\s*(https?:\/\/[^\s\n\r]+)/i);
                const u = b.match(/Usuário\s*►\s*([^\s\n\r]+)/i);
                const p = b.match(/Senha\s*►\s*([^\s\n\r]+)/i);
                return (h && u && p) ? {h: h[1], u: u[1], p: p[1]} : null;
            }).filter(x => x);

            logs.innerHTML = `✅ ${database.length} Listas carregadas com sucesso!`;
        } catch(e) { logs.innerHTML = "❌ Erro ao acessar GitHub. Verifique o arquivo lista.txt"; }
    }

    function gerar() {
        if(database.length === 0) return alert("Lista vazia!");
        const logs = document.getElementById("logs");
        const resDiv = document.getElementById("resultado");
        
        resDiv.style.display = "none";
        logs.innerHTML = "📡 Conectando...<br>🔍 Analisando lista...<br>⚡ Gerando acesso...";

        setTimeout(() => {
            const item = database[Math.floor(Math.random() * database.length)];
            document.getElementById("res-m3u").innerText = `${item.h}/get.php?username=${item.u}&password=${item.p}&type=m3u_plus&output=ts`;
            document.getElementById("res-u").innerText = item.u;
            document.getElementById("res-p").innerText = item.p;
            
            logs.innerHTML = "✅ Concluído! Acesso gerado abaixo.";
            resDiv.style.display = "block";
            
            // Abre seu anúncio em nova aba ao gerar
            window.open('https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507', '_blank');
        }, 1500);
    }
</script>
</body>
</html>
