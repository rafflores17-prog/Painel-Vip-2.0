<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APK BUGADO - VIP PAINEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #39ff14; --neon-purple: #bc13fe; --dark-bg: #050505; --card-bg: #0a0a0a; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--dark-bg); color: var(--neon-green); 
            font-family: 'Source Code Pro', monospace; margin: 0; padding: 0;
            overflow-x: hidden; display: flex; flex-direction: column; align-items: center;
        }

        .main-wrapper { width: 95%; max-width: 450px; padding: 20px 0; }

        /* HEADER E LOGO ESTILO 1000157735 */
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-img { 
            width: 180px; height: 180px; border-radius: 50%;
            border: 3px solid var(--neon-green); box-shadow: 0 0 20px var(--neon-green);
            background: url('https://i.imgur.com/your-lock-image.png') center/cover; /* Use sua imagem do cadeado aqui */
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
        }

        /* TELA DE BLOQUEIO (INICIAL) */
        #lock-section { text-align: center; padding: 20px; border: 1px solid #1a1a1a; border-radius: 15px; background: var(--card-bg); }
        .system-status { font-size: 10px; color: #555; margin-bottom: 15px; text-transform: uppercase; }

        /* INPUTS E BOTÕES */
        input { 
            background: #000; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 15px; width: 100%; border-radius: 8px; text-align: center;
            font-family: 'Orbitron'; margin-bottom: 15px; outline: none;
        }
        button { 
            width: 100%; padding: 15px; border-radius: 30px; font-family: 'Orbitron';
            font-weight: bold; cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase;
        }
        .btn-main { background: transparent; border: 1px solid var(--neon-purple); color: #fff; margin-bottom: 10px; }
        .btn-action { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        /* CONTEÚDO OCULTO (PÓS-LOGIN) */
        #vip-content { display: none; width: 100%; margin-top: 20px; }

        .dashboard-card { 
            background: var(--card-bg); border: 1px solid var(--neon-purple);
            border-radius: 15px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
        }

        .account-item {
            border-left: 3px solid var(--neon-green); background: #000;
            padding: 12px; margin-top: 15px; border-radius: 5px;
        }
        .label { color: var(--neon-purple); font-size: 9px; font-weight: bold; }
        .value { color: #fff; font-size: 12px; word-break: break-all; display: block; }

        .status-bar { font-size: 10px; text-align: center; margin: 15px 0; color: #888; }
        .copy-btn { background: #111; border: 1px solid #333; color: var(--neon-green); font-size: 10px; padding: 8px; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="logo-container">
            <div class="logo-img">
                <img src="https://img.icons8.com/nolan/128/security-lock.png" style="width:80px"> 
            </div>
            <h2 style="font-family: 'Orbitron'; font-size: 18px; margin:0;">[ VIP_PAINEL ]</h2>
        </div>

        <div id="lock-section">
            <div class="system-status">Aguardando Credenciais Mestre...</div>
            <input type="password" id="mestre-key" placeholder="••••••••">
            <button class="btn-action" onclick="checkAccess()">DESBLOQUEAR SISTEMA</button>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-main" style="font-size:9px">💎 ENTRAR VIP</button>
                <button class="btn-main" style="font-size:9px">📢 GRUPO</button>
            </div>
        </div>

        <div id="vip-content">
            <div class="status-bar" id="load-status">🟢 STATUS: PRONTO (CONECTADO)</div>
            
            <button class="btn-action" onclick="fetchList()">GERAR LISTA ATUALIZADA</button>
            
            <div id="accounts-display">
                </div>
        </div>
    </div>

<script>
    // 1. Lógica de Desbloqueio Sem Mudar de Tela
    async function checkAccess() {
        const key = document.getElementById('mestre-key').value.trim();
        try {
            const res = await fetch('config.json');
            const config = await res.json();
            
            if (config.access_keys.includes(key)) {
                document.getElementById('lock-section').style.display = 'none';
                document.getElementById('vip-content').style.display = 'block';
                // Opcional: Já carrega a lista automaticamente
                fetchList();
            } else { alert("CHAVE INVÁLIDA!"); }
        } catch (e) { alert("Erro ao conectar com servidor!"); }
    }

    // 2. Lógica de Geração em Cards na Mesma Tela
    async function fetchList() {
        const display = document.getElementById('accounts-display');
        display.innerHTML = '<div class="status-bar">Buscando no Banco de Dados...</div>';
        
        try {
            const res = await fetch('listas.txt');
            const data = await res.text();
            
            const blocks = data.split(/┏●|『|▬▬▬▬▬|🌐Host/).filter(b => b.includes('http'));
            display.innerHTML = ''; // Limpa o carregando

            blocks.forEach(block => {
                const host = block.match(/(?:http:\/\/[a-zA-Z0-9.-]+:[0-9]+)/i)?.[0];
                const user = block.match(/(?:Usuário|Usᴜᴀʀɪᴏ|👤Usuário)\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1];
                const pass = block.match(/(?:Senha|Sᴇɴʜᴀ|🔒Senha)\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1];
                const exp = block.match(/(?:Expira|Vᴇɴᴄɪᴍᴇɴᴛᴏ|⏳Expira)\s*►\s*([0-9\/.]+)/i)?.[1];

                if (host && user && pass) {
                    const link = `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=ts`;
                    
                    display.innerHTML += `
                        <div class="dashboard-card">
                            <span style="float:right; color:var(--neon-green); font-size:9px;">● ONLINE</span>
                            <span class="label">💎 VIP APKBUGADO PREMIUM</span>
                            
                            <div class="account-item">
                                <span class="label">🔗 URL M3U8:</span>
                                <span class="value" style="font-size:10px; color:#39ff14;">${link}</span>
                            </div>

                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <div style="flex:1">
                                    <span class="label">⚙️ XTREAM HOST:</span>
                                    <span class="value">${host}</span>
                                </div>
                            </div>
                            
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <div style="flex:1">
                                    <span class="label">USER:</span>
                                    <span class="value">${user}</span>
                                </div>
                                <div style="flex:1">
                                    <span class="label">PASS:</span>
                                    <span class="value">${pass}</span>
                                </div>
                            </div>

                            <div style="margin-top:10px;">
                                <span class="label">📅 VENCIMENTO:</span>
                                <span class="value" style="color:yellow">${exp || '01/01/2027'}</span>
                            </div>

                            <button class="copy-btn" onclick="copy('${link}')">COPIAR ACESSO COMPLETO</button>
                        </div>
                    `;
                }
            });
        } catch (e) { display.innerHTML = 'Erro ao ler listas.txt'; }
    }

    function copy(t) { navigator.clipboard.writeText(t); alert("Copiado!"); }
</script>
</body>
</html>
