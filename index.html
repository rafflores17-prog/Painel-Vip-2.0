<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador VIP IPTV</title><link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet"><style>
body{
background:#060606;
color:#fff;
font-family:'Inter';
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
max-width:420px;
width:100%;
background:#111;
padding:25px;
border-radius:20px;
}

.title{
text-align:center;
font-family:'Orbitron';
color:#00ff9c;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-bottom:10px;
background:#000;
color:#00ff9c;
text-align:center;
}

.grid{
display:flex;
gap:10px;
margin-bottom:20px;
}

.btn{
flex:1;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.vip{background:#bc13fe;}
.free{background:#00d2ff;}
.main{background:#00ff9c;color:#000;}

.status{
text-align:center;
font-size:12px;
margin-top:10px;
color:#888;
}

.loader{
height:4px;
background:#222;
border-radius:10px;
overflow:hidden;
display:none;
margin-top:10px;
}

.loader span{
display:block;
height:100%;
width:40%;
background:linear-gradient(90deg,#00ff9c,#00d2ff);
animation:load 1s infinite;
}

@keyframes load{
0%{margin-left:-40%;}
100%{margin-left:100%;}
}

#out{
display:none;
margin-top:15px;
padding:15px;
background:#0a0a0a;
border-radius:10px;
}

.box{
background:#000;
padding:8px;
border-radius:6px;
margin-bottom:6px;
word-break:break-word;
}

.history{
margin-top:15px;
font-size:11px;
color:#888;
}

.copy.done{
background:#00ff9c;
color:#000;
}
</style></head><body><div class="card"><div class="title">GERADOR VIP IPTV</div><div id="login">
<input type="password" id="senha" placeholder="DIGITE A CHAVE">
<button class="btn main" onclick="logar()">DESBLOQUEAR</button>
</div><div id="painel" style="display:none;"><div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
<button class="btn vip">VIP</button></a><a href="https://t.me/ApkBugado" target="_blank">
<button class="btn free">FREE</button></a>
</div><button class="btn main" onclick="gerar()">GERAR ACESSO</button>

<div class="status" id="status">Sistema ativo</div><div class="loader" id="loader"><span></span></div><div id="out"></div><div class="history" id="history"></div></div></div><script>

let lista=[];
let usadas=[];
let ultimoHost=null;

/* LOGIN */
async function logar(){
let senha=document.getElementById("senha").value.trim();

let cfg=await (await fetch("config.json")).json();

if(cfg.access_keys.includes(senha)){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
carregar();
}
}

/* DATA PARA ORDENAR */
function parseData(d){
if(!d) return 0;
let p=d.split("/");
return new Date(p[2],p[1]-1,p[0]).getTime();
}

/* CARREGAR */
async function carregar(){

let status=document.getElementById("status");
status.innerText="Carregando base...";

let t=await (await fetch("listas.txt?"+Date.now())).text();

let blocos=t.split(/┏|『/g);

lista=blocos.map(b=>{

b=b.normalize("NFD").replace(/[^\x00-\x7F]/g,"");

let host=b.match(/http:\/\/[^\s]+:\d+/i)?.[0];
let user=b.match(/user[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let pass=b.match(/pass[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let exp=b.match(/(expira|vencimento)[^0-9]*([0-9\/]+)/i)?.[2];

let m=b.match(/get\.php\?username=([^\s&]+)&password=([^\s&]+)/i);

if(m){
return {host,user:m[1],pass:m[2],exp};
}

if(host&&user&&pass){
return {host,user,pass,exp};
}

}).filter(x=>x);

/* ordenar por validade */
lista.sort((a,b)=>parseData(b.exp)-parseData(a.exp));

status.innerText=lista.length+" contas carregadas";

mostrarHistorico();
}

/* TESTE ONLINE */
async function testar(link){
try{
let r=await fetch(link,{method:"HEAD"});
return r.status==200;
}catch{
return false;
}
}

/* GERAR */
async function gerar(){

let out=document.getElementById("out");
let status=document.getElementById("status");
let loader=document.getElementById("loader");

out.style.display="none";
loader.style.display="block";

status.innerText="Processando...";
await delay(500);

let disponiveis=lista.filter(x=>!usadas.includes(x.user));
if(disponiveis.length==0){
usadas=[];
disponiveis=lista;
}

let filtrado=disponiveis.filter(x=>x.host!==ultimoHost);
if(filtrado.length==0) filtrado=disponiveis;

let c=filtrado[Math.floor(Math.random()*filtrado.length)];

usadas.push(c.user);
ultimoHost=c.host;

let link=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

status.innerText="Testando conexão...";
let online=await testar(link);

let statusOnline=online ? "🟢 ONLINE" : "🔴 OFFLINE";

/* salvar histórico */
let hist=JSON.parse(localStorage.getItem("hist")||"[]");
hist.unshift(c);
hist=hist.slice(0,5);
localStorage.setItem("hist",JSON.stringify(hist));

out.innerHTML=`
<b style="color:#bc13fe;">ACESSO LIBERADO</b><br><br>

🌐 HOST<div class="box">${c.host}</div>

🔗 M3U<div class="box">${link}</div>

👤 USER<div>${c.user}</div>

🔑 PASS<div>${c.pass}</div>

📅 VALIDADE<div>${c.exp || "N/A"}</div>

📡 STATUS<div>${statusOnline}</div>

<button class="btn main copy" onclick="copiar('${link}', this)">COPIAR</button>
`;

loader.style.display="none";
out.style.display="block";
status.innerText="Concluído";

mostrarHistorico();
}

/* HISTÓRICO */
function mostrarHistorico(){
let h=JSON.parse(localStorage.getItem("hist")||"[]");

let div=document.getElementById("history");

div.innerHTML="<br>Últimos acessos:<br>" + h.map(x=>`• ${x.user}`).join("<br>");
}

/* COPY */
function copiar(text,btn){
navigator.clipboard.writeText(text);
btn.innerText="COPIADO ✔";
btn.classList.add("done");

setTimeout(()=>{
btn.innerText="COPIAR";
btn.classList.remove("done");
},1500);
}

function delay(ms){
return new Promise(r=>setTimeout(r,ms));
}

</script></body>
</html>
