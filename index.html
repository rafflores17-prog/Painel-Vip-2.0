<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GERADOR APKBUGADO VIP</title>
    <style>
        :root { --primary: #00ff88; --bg: #050505; --card: #0f0f0f; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; padding: 15px; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .title { color: var(--primary); text-align: center; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; font-size: 1.2em; }
        
        /* ADS CONTAINERS */
        .ad-box { margin: 15px 0; text-align: center; background: #000; border-radius: 10px; min-height: 50px; border: 1px dashed #333; overflow: hidden; }

        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 16px; transition: 0.3s; }
        .btn-main:active { transform: scale(0.98); }

        #logs { background: #000; border-radius: 10px; padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; color: var(--primary); margin-bottom: 15px; border: 1px solid #111; min-height: 80px; line-height: 1.5; }
        
        .box-info { background: #141414; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #0088cc; animation: fadeIn 0.5s; }
        .label { font-size: 11px; color: #0088cc; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 13px; color: #eee; word-break: break-all; font-family: monospace; }
        
        #login-screen { text-align: center; padding: 20px 0; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--primary); border-radius: 12px; text-align: center; font-size: 20px; margin-bottom: 20px; box-sizing: border-box; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="title">ACESSO RESTRITO</div>
        <input type="password" id="keyInput" placeholder="DIGITE A SENHA VIP">
        <button class="btn-main" onclick="entrar()">ENTRAR NO PAINEL</button>
    </div>

    <div id="main-panel" style="display:none">
        <div class="title">GERADOR APKBUGADO</div>

        <div class="ad-box">
            <script type="text/javascript">
                atOptions = { 'key' : 'a8a116d252f41a02d16bcf030d61ce58', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
            </script>
            <script type="text/javascript" src="//encouragingjawsordinarily.com/invoke.js"></script>
        </div>

        <button class="btn-main" id="btnGerar" onclick="gerar()">🚀 SORTEAR NOVO ACESSO</button>

        <div class="ad-box">
            <a href="https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507" target="_blank" style="color: #666; text-decoration: none; font-size: 11px; display: block; padding: 10px;">
                CLIQUE AQUI PARA LIBERAR MAIS VELOCIDADE
            </a>
        </div>

        <div id="logs">📡 Sistema pronto. Aguardando comando...</div>

        <div id="resultado" style="display:none">
            <div class="box-info">
                <div class="label">Link M3U (Copie e Cole)</div>
                <div id="res-m3u" class="val" style="color: var(--primary);"></div>
            </div>
            <div style="display:flex; gap:10px;">
                <div class="box-info" style="flex:1"><div class="label">Usuário</div><div id="res-u" class="val"></div></div>
                <div class="box-info" style="flex:1"><div class="label">Senha</div><div id="res-p" class="val"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const GITHUB_FILE = "https://raw.githubusercontent.com/rafflores17-prog/Painel-Vip-2.0/main/lista.txt";
    let bancoDados = [];

    async function entrar() {
        const inputSenha = document.getElementById("keyInput").value;
        // Definida a senha conforme seu pedido
        if(inputSenha === "VIP2030") {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-panel").style.display = "block";
            await carregarLista();
        } else {
            alert("Senha incorreta, Mestre!");
        }
    }

    async function carregarLista() {
        const logs = document.getElementById("logs");
        try {
            // Usando proxy para evitar erro de servidor/CORS do Vercel
            const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(GITHUB_FILE + "?" + Date.now());
            const response = await fetch(proxyUrl);
            const data = await response.json();
            const texto = data.contents;
            
            // Regex para capturar os dados do seu layout de Scan
            const blocos = texto.split(/┏●/);
            bancoDados = blocos.map(bloco => {
                const h = bloco.match(/Host\s*►\s*(https?:\/\/[^\s\n\r]+)/i);
                const u = bloco.match(/Usuário\s*►\s*([^\s\n\r]+)/i);
                const p = bloco.match(/Senha\s*►\s*([^\s\n\r]+)/i);
                return (h && u && p) ? {h: h[1].trim(), u: u[1].trim(), p: p[1].trim()} : null;
            }).filter(item => item !== null);

            logs.innerHTML = `✅ Sucesso! ${bancoDados.length} acessos carregados.`;
        } catch(err) {
            logs.innerHTML = "❌ Erro ao conectar ao banco de dados GitHub.";
        }
    }

    function gerar() {
        if(bancoDados.length === 0) return alert("Aguarde o carregamento da lista...");
        
        const logs = document.getElementById("logs");
        const resDiv = document.getElementById("resultado");
        resDiv.style.display = "none";
        
        // Efeito de processamento visual
        logs.innerHTML = "🔍 Localizando servidor...<br>📡 Validando Token...<br>⚡ Gerando URL Final...";

        setTimeout(() => {
            const conta = bancoDados[Math.floor(Math.random() * bancoDados.length)];
            const m3uUrl = `${conta.h}/get.php?username=${conta.u}&password=${conta.p}&type=m3u_plus&output=ts`;
            
            document.getElementById("res-m3u").innerText = m3uUrl;
            document.getElementById("res-u").innerText = conta.u;
            document.getElementById("res-p").innerText = conta.p;
            
            logs.innerHTML = "✅ ACESSO GERADO COM SUCESSO!";
            resDiv.style.display = "block";
            
            // Abre o anúncio em nova aba ao gerar (Monetização)
            window.open('https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507', '_blank');
        }, 1800);
    }
</script>
</body>
</html>
