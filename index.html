<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APK BUGADO - COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #00ff9c; --neon-purple: #bc13fe; --neon-blue: #00d2ff; --neon-yellow: #f9d423; --dark-bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Share Tech Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        
        .card-painel { width: 100%; max-width: 420px; padding: 25px; border: 1px solid rgba(0, 255, 156, 0.2); border-radius: 20px; box-shadow: 0 0 40px rgba(0,0,0,1); text-align: center; background: #0a0a0a; position: relative; }
        
        .vip-ring { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--neon-green); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--neon-green); position: relative; }
        .vip-ring::after { content: "VIP"; font-family: 'Orbitron'; font-size: 24px; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        .btn-3d { width: 100%; padding: 15px; border: none; border-radius: 12px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: all 0.2s ease; margin-bottom: 15px; display: inline-block; text-decoration: none; text-align: center; }
        .btn-green { background: linear-gradient(145deg, #00ff9c, #008f58); color: #000; box-shadow: 0 6px #005a38; }
        .btn-green:active { box-shadow: 0 2px #005a38; transform: translateY(4px); }
        .btn-purple { background: linear-gradient(145deg, #bc13fe, #7a00aa); color: #fff; box-shadow: 0 6px #520073; }

        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #222; background: #000; color: var(--neon-green); text-align: center; font-size: 16px; margin-bottom: 15px; outline: none; font-family: 'Share Tech Mono'; }

        /* Estilo do Painel de SaГ­da */
        #out { background: #020202; padding: 18px; margin-top: 15px; border-radius: 15px; font-size: 12px; text-align: left; border-left: 4px solid var(--neon-purple); display: none; opacity: 0; transition: opacity 0.3s ease; }
        
        /* AnimaГ§ГЈo de Processamento */
        .processing { animation: scan 0.5s ease infinite alternate; }
        @keyframes scan { from { filter: brightness(1); } to { filter: brightness(1.5) drop-shadow(0 0 5px var(--neon-green)); } }

        .label { color: #666; font-size: 9px; display: block; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .val-m3u { color: var(--neon-green); font-size: 10px; word-break: break-all; background: #080808; padding: 8px; border-radius: 6px; display: block; margin-top: 5px; border: 1px solid #1a1a1a; }
        .status-msg { margin-top: 10px; font-size: 10px; color: #444; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card-painel">
    <div style="color:var(--neon-green); font-size: 10px; letter-spacing: 4px; margin-bottom: 15px; font-family: 'Orbitron';">[ APK_BUGADO_V8 ]</div>
    <div class="vip-ring"></div>

    <div id="login-box">
        <input type="password" id="senhaInput" placeholder="DIGITE A CHAVE MESTRA">
        <button class="btn-3d btn-green" onclick="validarAcesso()">DESBLOQUEAR SISTEMA</button>
    </div>

    <div id="painel" style="display:none;">
        <button id="btn-gerar" class="btn-3d btn-green" onclick="gerarAcesso()">GERAR CONTA IPTV</button>
        <button class="btn-3d btn-purple" style="padding: 10px; font-size: 10px;" onclick="copiarDados()">COPIAR TUDO</button>
        <div class="status-msg" id="status">SISTEMA ONLINE</div>
        <div id="out"></div>
    </div>
</div>

<script>
let listaContas = [];
let contasUsadas = [];

async function validarAcesso() {
    const input = document.getElementById('senhaInput').value.trim();
    try {
        const response = await fetch('config.json?v=' + Date.now());
        const config = await response.json();
        if(config.access_keys.includes(input)) {
            document.getElementById('login-box').style.display = "none";
            document.getElementById('painel').style.display = "block";
            carregarDatabase();
        } else { alert("ACESSO NEGADO!"); }
    } catch (e) { alert("ERRO DE CONFIGURAГ‡ГѓO"); }
}

async function carregarDatabase() {
    try {
        const r = await fetch('listas.txt?v=' + Date.now());
        const t = await r.text();
        const blocos = t.split(/(?=http)/g).filter(b => b.includes('http'));
        
        listaContas = blocos.map(b => {
            let host = b.match(/http:\/\/[a-zA-Z0-9.-]+:[0-9]+/i)?.[0];
            // Regex melhorada: Ignora a palavra "UsuГЎrio" e pega apenas o valor real
            let user = b.match(/(?:UsuГЎrio|рџ‘¤|username=)\s*[:в–є ]*([a-zA-Z0-9._-]+)/i)?.[1];
            let pass = b.match(/(?:Senha|рџ”’|password=)\s*[:в–є ]*([a-zA-Z0-9._-]+)/i)?.[1];
            let exp = b.match(/(?:Vencimento|вЏі|Expira)\s*[:в–є ]*([0-9\/.]+)/i)?.[1];

            // Backup: Se falhou na regex acima, tenta pegar do link M3U
            if(!user || user === "Usu") {
                let m = b.match(/username=([a-zA-Z0-9._-]+)&password=([a-zA-Z0-9._-]+)/i);
                if(m) { user = m[1]; pass = m[2]; }
            }
            return { host, user, pass, exp };
        }).filter(a => a.host && a.user && a.pass);
        
        document.getElementById('status').textContent = `${listaContas.length} CONTAS SINCRONIZADAS`;
    } catch(e) { document.getElementById('status').textContent = "ERRO DE SINCRONIZAГ‡ГѓO"; }
}

function gerarAcesso() {
    if(listaContas.length === 0) return;
    const out = document.getElementById('out');
    const btn = document.getElementById('btn-gerar');

    // EFEITO DE PROCESSAMENTO
    out.style.opacity = "0";
    btn.classList.add('processing');
    btn.innerText = "PROCESSANDO...";

    setTimeout(() => {
        let disponiveis = listaContas.filter(c => !contasUsadas.includes(c.user));
        if(disponiveis.length === 0) { contasUsadas = []; disponiveis = listaContas; }

        const conta = disponiveis[Math.floor(Math.random() * disponiveis.length)];
        contasUsadas.push(conta.user);

        const urlM3u = `${conta.host}/get.php?username=${conta.user}&password=${conta.pass}&type=m3u_plus&output=ts`;

        out.innerHTML = `
            <span style="color:var(--neon-purple); font-weight:bold; font-size:11px;">рџ’Ћ ACESSO VIP EXTRATГЌDO</span><br>
            
            <span class="label">LINK M3U8 (DIRETO):</span>
            <span class="val-m3u">${urlM3u}</span>
            
            <span class="label">DADOS XTREAM:</span>
            <span style="color:var(--neon-blue); font-weight:bold;">${conta.host}</span><br>
            <span style="color:#fff">USER: ${conta.user}</span><br>
            <span style="color:var(--neon-yellow)">PASS: ${conta.pass}</span>
            
            <span class="label">VALIDADE:</span>
            <span style="color:var(--neon-green)">${conta.exp || 'вљЎ ACESSO VITALГЌCIO'}</span>
        `;

        btn.classList.remove('processing');
        btn.innerText = "GERAR CONTA IPTV";
        out.style.display = "block";
        setTimeout(() => out.style.opacity = "1", 50);
        document.getElementById('status').textContent = `CONTA [${contasUsadas.length}/${listaContas.length}]`;
    }, 600); // 0.6 segundos de delay para simular processamento
}

function copiarDados() {
    const out = document.getElementById('out');
    if(out.style.display === "block") {
        const t = document.createElement('textarea');
        t.value = out.innerText;
        document.body.appendChild(t); t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        alert("COPIADO PARA ГЃREA DE TRANSFERГЉNCIA!");
    }
}
</script>
</body>
</html>
