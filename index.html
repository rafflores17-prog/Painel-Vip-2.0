<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR VIP IPTV PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body{background:#050505;color:#fff;font-family:'Share Tech Mono', monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;}
.card{width:100%;max-width:420px;background:#0a0a0a;padding:20px;border-radius:20px;box-shadow:0 0 40px #000;}
.title{text-align:center;font-family:'Orbitron';color:#00ff9c;margin-bottom:10px;}
input{width:100%;padding:15px;border-radius:12px;border:1px solid #111;background:#000;color:#00ff9c;text-align:center;}
.btn{width:100%;padding:15px;border:none;border-radius:12px;cursor:pointer;font-weight:bold;margin-top:10px;}
.vip{background:linear-gradient(135deg,#bc13fe,#7a00aa);}
.free{background:linear-gradient(135deg,#00d2ff,#006a80);}
.main{background:linear-gradient(135deg,#00ff9c,#008f58);color:#000;}
.grid{display:flex;gap:10px;}
.status{margin-top:10px;font-size:12px;background:#000;padding:10px;border-radius:10px;height:120px;overflow-y:auto;color:#00ff9c;}
#out{display:none;margin-top:15px;}
.box{background:#111;padding:10px;border-radius:10px;margin-bottom:8px;}
.label{font-size:10px;color:#777;}
.val{font-size:13px;word-break:break-word;}
.green{color:#00ff9c;}
.blue{color:#00d2ff;}
.white{color:#fff;}
.purple{color:#bc13fe;}
.red{color:#ff4d4d;}
.row{display:flex;gap:10px;}
.col{flex:1;}
</style>
</head>
<body>

<div class="card">
<div class="title">GERADOR VIP IPTV PRO</div>
<div id="login">
<input type="password" id="senha" placeholder="Digite a chave">
<button class="btn main" onclick="logar()">DESBLOQUEAR</button>
</div>

<div id="painel" style="display:none;">
<div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank"><button class="btn vip">💎 GRUPO VIP</button></a>
<a href="https://t.me/ApkBugado" target="_blank"><button class="btn free">📢 GRUPO FREE</button></a>
</div>
<button class="btn main" id="btnGerar" onclick="startGerar()">🚀 GERAR ACESSO</button>
<button class="btn main" onclick="abrirAd(); copiar();">📋 COPIAR</button>
<div class="status" id="status"></div>
<div id="out"></div>
</div>
</div>

<script>
/* CONFIGURAÇÃO DIRETA DO GITHUB */
const GITHUB_RAW = "https://raw.githubusercontent.com/rafflores17-prog/Painel-Vip-2.0/main/";

let lista=[];
let abriuAd=false;
let gerando=false;

/* LOGIN SEM PHP - BUSCA O JSON NO GITHUB */
async function logar(){
    let senhaDigitada = document.getElementById("senha").value.trim();
    if(!senhaDigitada) return alert("Digite a chave!");

    try {
        let r = await fetch(GITHUB_RAW + "config.json?" + Date.now());
        let dados = await r.json();

        if(dados.senhas.includes(senhaDigitada)){
            document.getElementById("login").style.display="none";
            document.getElementById("painel").style.display="block";
            carregar();
        } else {
            alert("❌ Chave inválida!");
        }
    } catch(e) {
        alert("Erro ao carregar configurações do GitHub.");
    }
}

/* CARREGAR LISTAS.TXT */
async function carregar(){
    let s = document.getElementById("status");
    s.innerHTML = "⏳ Sincronizando listas...";
    try {
        let r = await fetch(GITHUB_RAW + "listas.txt?" + Date.now());
        let txt = await r.text();
        let blocos = txt.split(/┏|Host/g);
        lista = blocos.map(b => {
            let host = b.match(/http:\/\/[^\s]+:\d+/i)?.[0];
            let user = b.match(/Usu[aá]rio[^a-z0-9]*([a-z0-9@._-]+)/i)?.[1];
            let pass = b.match(/Senha[^a-z0-9]*([a-z0-9@._-]+)/i)?.[1];
            if(host && user && pass) return { host, user, pass };
        }).filter(x => x);
        s.innerHTML = `✔ ${lista.length} Listas carregadas!`;
    } catch(e) {
        s.innerHTML = "❌ Erro ao baixar listas.";
    }
}

/* TESTE DE STATUS - DIRETO PELO NAVEGADOR */
async function testarReal(m3u){
    try {
        // Tenta um fetch rápido no Host para ver se responde
        let controller = new AbortController();
        setTimeout(() => controller.abort(), 4000);
        let r = await fetch(m3u, { mode: 'no-cors', signal: controller.signal });
        return true; // Se não deu erro de rede, consideramos ON
    } catch {
        return false;
    }
}

function startGerar(){
    if(gerando || lista.length === 0) return;
    gerando = true;
    document.getElementById("btnGerar").innerText = "⏳ PROCESSANDO...";
    abrirAd();
    fakeScan(gerar);
}

function fakeScan(callback){
    let s = document.getElementById("status");
    let etapas = ["🔍 Conectando...", "📡 Analisando...", "⚡ Buscando...", "✅ Concluído"];
    let i = 0;
    s.innerHTML = "";
    function loop(){
        if(i < etapas.length){
            s.innerHTML += etapas[i] + "<br>";
            i++;
            setTimeout(loop, 400);
        } else callback();
    }
    loop();
}

function abrirAd(){
    if(!abriuAd){
        window.open("https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507","_blank");
        abriuAd = true;
    }
}

async function gerar(){
    let out = document.getElementById("out");
    let c = lista[Math.floor(Math.random() * lista.length)];
    let m3u = `${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

    let online = await testarReal(c.host);
    let statusIcon = online ? "🟢 ONLINE" : "🔴 OFFLINE";

    out.innerHTML = `
        <div class="box"><div class="label">🔗 M3U</div><div class="val green">${m3u}</div></div>
        <div class="row">
            <div class="box col"><div class="label">👤 LOGIN</div><div class="val white">${c.user}</div></div>
            <div class="box col"><div class="label">🔑 SENHA</div><div class="val white">${c.pass}</div></div>
        </div>
        <div class="box"><div class="label">📡 STATUS</div><div class="val ${online?'green':'red'}">${statusIcon}</div></div>
    `;
    out.style.display = "block";
    document.getElementById("btnGerar").innerText = "🚀 GERAR ACESSO";
    gerando = false;
}

function copiar(){
    navigator.clipboard.writeText(document.getElementById("out").innerText);
    document.getElementById("status").innerHTML += "<br>✔ Copiado!";
}
</script>
</body>
</html>
