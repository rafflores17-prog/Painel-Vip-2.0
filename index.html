<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR VIP IPTV PRO - REAL TIME</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{background:#050505;color:#fff;font-family:'Share Tech Mono', monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:10px;}
.card{width:100%;max-width:420px;background:#0a0a0a;padding:20px;border-radius:20px;box-shadow:0 0 40px #000;border:1px solid #1a1a1a;}
.title{text-align:center;font-family:'Orbitron';color:#00ff9c;margin-bottom:20px;}
input{width:100%;padding:15px;border-radius:12px;border:1px solid #111;background:#000;color:#00ff9c;text-align:center;margin-bottom:10px;}
.btn{width:100%;padding:15px;border:none;border-radius:12px;cursor:pointer;margin-top:10px;font-family:'Orbitron';transition: 0.3s;}
.btn:active{transform: scale(0.95);}
.vip{background:linear-gradient(135deg,#bc13fe,#7a00aa);}
.free{background:linear-gradient(135deg,#00d2ff,#006a80);}
.main{background:linear-gradient(135deg,#00ff9c,#008f58);color:#000;}
.grid{display:flex;gap:10px;}
.status{margin-top:10px;font-size:11px;background:#000;padding:12px;border-radius:10px;height:90px;overflow-y:auto;border: 1px solid #111;}
#out{display:none;margin-top:15px;}
.box{background:#111;padding:12px;border-radius:10px;margin-bottom:8px;border:1px solid #222;}
.label{font-size:10px; color: #888; margin-bottom: 4px;}
.val{font-size:13px;word-break:break-all; color: #00ff9c;}
.row{display:flex;gap:10px;}
.col{flex:1;}
</style>
</head>

<body>
<div class="card">

<div class="title">GERADOR VIP IPTV PRO</div>

<div id="login">
<input type="password" id="senha" placeholder="CHAVE DE ACESSO">
<button class="btn main" onclick="logar()">ENTRAR NO PAINEL</button>

<div style="margin-top:20px;border-top:1px solid #222;padding-top:10px;">
<div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank" style="flex:1;">
<button class="btn vip" style="width:100%;">💎 ADQUIRIR VIP</button>
</a>
<a href="https://t.me/ApkBugado" target="_blank" style="flex:1;">
<button class="btn free" style="width:100%;">📢 GRUPO FREE</button>
</a>
</div>
</div>
</div>

<div id="painel" style="display:none;">
<button class="btn main" id="btnGerar" onclick="startGerar()">🚀 GERAR ACESSO</button>
<button class="btn" onclick="copiar()">📋 COPIAR DADOS</button>

<div class="status" id="statusLog">Aguardando comando...</div>
<div id="out"></div>
</div>
</div>

<script>
let listaContas = [];
let processando = false;

async function logar(){
    const senha = document.getElementById("senha").value.trim();
    try{
        let r = await fetch("config.json?" + Date.now());
        let cfg = await r.json();
        if(senha === cfg.chave_mestre){
            document.getElementById("login").style.display="none";
            document.getElementById("painel").style.display="block";
            carregarLista();
        }else{ alert("Chave incorreta!"); }
    }catch{ alert("Erro ao carregar config.json"); }
}

async function carregarLista(){
    let log = document.getElementById("statusLog");
    try{
        let r = await fetch("https://raw.githubusercontent.com/rafflores17-prog/Painel-Vip-2.0/main/listas.txt?" + Date.now());
        let txt = await r.text();
        let linhas = txt.split(/\r?\n/);
        let tUser = null, tPass = null, tExp = null, tHost = null;

        const reUser = /(?:Usu[aá]rio|User|Login|Email|👩)\s*[➤►=:]+\s*([^\s\n\r|`*]+)/i;
        const rePass = /(?:Senha|Pass|🔑)\s*[➤►=:]+\s*([^\s\n\r|`*]+)/i;
        const reExp  = /(?:Exp\.?|Expira|Vencimento|Expiry|📆|⏳)\s*[➤►=:]+\s*([\d\/-]+)/i;
        const reHost = /(?:Host|🌐|Hospedagem)\s*[➤►=:]+\s*(http[s]?:\/\/[^\s\n\r`*]+)/i;

        listaContas = [];
        linhas.forEach(linha => {
            let limpa = linha.replace(/[`*']/g, ""); 
            let u = limpa.match(reUser);
            let p = limpa.match(rePass);
            let e = limpa.match(reExp);
            let h = limpa.match(reHost);

            if (u) tUser = u[1].trim();
            if (p) tPass = p[1].trim();
            if (e) tExp = e[1].trim();
            if (h) tHost = h[1].trim().replace(/\/$/, "");

            if (tUser && tPass) {
                listaContas.push({
                    host: tHost || "http://stv.cx",
                    user: tUser,
                    pass: tPass,
                    validade: tExp || "Pendente..."
                });
                tUser = null; tPass = null; tExp = null;
            }
        });
        log.innerHTML = `<span style="color:#00ff9c">✔ ${listaContas.length} CONTAS CARREGADAS</span>`;
    }catch(err){ log.innerHTML = "Erro ao carregar lista.txt"; }
}

async function startGerar(){
    if(processando || listaContas.length === 0) return;
    processando = true;
    document.getElementById("out").style.display = "none";
    let log = document.getElementById("statusLog");
    log.innerHTML = "";
    
    let conta = listaContas[Math.floor(Math.random()*listaContas.length)];
    let etapas = ["🔍 Localizando servidor...", "📡 Verificando API...", "🔐 Autenticando..."];
    let i = 0;
    let interval = setInterval(() => {
        if(i < etapas.length){ 
            log.innerHTML += `<span style="color:#00ff9c">${etapas[i]}</span><br>`; 
            i++; 
        } else { 
            clearInterval(interval); 
            validarReal(conta);
        }
    }, 400);
}

async function validarReal(c) {
    let log = document.getElementById("statusLog");
    let infoReal = { status: "OFFLINE ❌", validade: c.validade, conexoes: "0/0" };

    try {
        const proxy = "https://corsproxy.io/?"; 
        const apiUrl = `${proxy}${encodeURIComponent(c.host)}/player_api.php?username=${c.user}&password=${c.pass}`;

        let response = await fetch(apiUrl);
        let data = await response.json();

        if (data.user_info) {
            let info = data.user_info;
            infoReal.status = info.status === "Active" ? "ONLINE ✅" : "INATIVO ⚠️";
            
            if (info.exp_date && info.exp_date !== "null" && info.exp_date !== "0") {
                let d = new Date(info.exp_date * 1000);
                infoReal.validade = d.toLocaleDateString('pt-BR');
            } else {
                infoReal.validade = "ILIMITADA";
            }
            infoReal.conexoes = `${info.active_cons || 0} / ${info.max_connections || 1}`;
            log.innerHTML += `<span style="color:#00ff9c">✅ DADOS ATUALIZADOS DO PAINEL!</span>`;
        }
    } catch (err) {
        log.innerHTML += `<span style="color:#ffcc00">⚠️ SERVIDOR EM MANUTENÇÃO (CACHE)</span>`;
    }
    exibir(c, infoReal);
}

function exibir(c, infoReal){
    let m3u = `${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

    document.getElementById("out").innerHTML = `
    <div class="box"><div class="label">📡 STATUS DO SERVIDOR</div><div class="val">${infoReal.status}</div></div>
    <div class="box"><div class="label">🔗 LINK M3U VIP</div><div class="val" id="copy-target">${m3u}</div></div>
    <div class="row">
        <div class="box col"><div class="label">👤 USUÁRIO</div><div class="val">${c.user}</div></div>
        <div class="box col"><div class="label">🔑 SENHA</div><div class="val">${c.pass}</div></div>
    </div>
    <div class="row">
        <div class="box col"><div class="label">📅 VALIDADE REAL</div><div class="val">${infoReal.validade}</div></div>
        <div class="box col"><div class="label">👥 CONEXÕES</div><div class="val">${infoReal.conexoes}</div></div>
    </div>
    <div class="box"><div class="label">🌐 HOST ORIGINAL</div><div class="val">${c.host}</div></div>
    `;
    document.getElementById("out").style.display="block";
    processando = false;
}

function copiar(){
    let t = document.getElementById("copy-target");
    if(!t) return alert("Gere primeiro!");
    navigator.clipboard.writeText(t.innerText);
    alert("Copiado!");
}
</script>
</body>
</html>
