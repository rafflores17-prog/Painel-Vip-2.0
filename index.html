<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GERADOR VIP IPTV PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{background:#050505;color:#fff;font-family:'Share Tech Mono', monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;}
.card{width:100%;max-width:420px;background:#0a0a0a;padding:20px;border-radius:20px;box-shadow:0 0 40px #000;}
.title{text-align:center;font-family:'Orbitron';color:#00ff9c;margin-bottom:10px;}
input{width:100%;padding:15px;border-radius:12px;border:1px solid #111;background:#000;color:#00ff9c;text-align:center;}
.btn{width:100%;padding:15px;border:none;border-radius:12px;cursor:pointer;font-weight:bold;margin-top:10px;}
.vip{background:linear-gradient(135deg,#bc13fe,#7a00aa);}
.free{background:linear-gradient(135deg,#00d2ff,#006a80);}
.main{background:linear-gradient(135deg,#00ff9c,#008f58);color:#000;}
.grid{display:flex;gap:10px;}
.status{margin-top:10px;font-size:12px;background:#000;padding:10px;border-radius:10px;height:120px;overflow-y:auto;color:#00ff9c;}
#ads{margin-top:10px;text-align:center;}
#out{display:none;margin-top:15px;}
.box{background:#111;padding:10px;border-radius:10px;margin-bottom:8px;}
.label{font-size:10px;color:#777;}
.val{font-size:13px;word-break:break-word;}
.green{color:#00ff9c;}
.blue{color:#00d2ff;}
.white{color:#fff;}
.purple{color:#bc13fe;}
.red{color:#ff4d4d;}
.row{display:flex;gap:10px;}
.col{flex:1;}
</style>
</head>

<body>

<div class="card">
<div class="title">GERADOR VIP IPTV PRO</div>

<div id="login">
<input type="password" id="senha" placeholder="Digite a chave">
<button class="btn main" onclick="logar()">DESBLOQUEAR</button>
</div>

<div id="painel" style="display:none;">
<div class="grid">

<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
<button class="btn vip">💎 GRUPO VIP</button>
</a>

<a href="https://t.me/ApkBugado" target="_blank">
<button class="btn free">📢 GRUPO FREE</button>
</a>

</div>

<button class="btn main" id="btnGerar" onclick="startGerar()">🚀 GERAR ACESSO</button>
<button class="btn main" onclick="abrirAd(); copiar();">📋 COPIAR</button>

<div class="status" id="status"></div>
<div id="ads"></div>
<div id="out"></div>
</div>
</div>

<script>

let lista=[];
let abriuAd=false;
let gerando=false;

/* LOGIN COM SENHA */
function logar(){

let senha = document.getElementById("senha").value.trim();

let keys = ["123","vip2026","admin"];

if(keys.includes(senha)){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
carregar();
}else{
alert("Senha inválida");
}

}

/* SMARTLINK */
function abrirAd(){
if(!abriuAd){
window.open("https://encouragingjawsordinarily.com/wazwpzwvxa?key=20c27c4105f08438a698b55802257507","_blank");
abriuAd=true;
}
}

/* CARREGAR LISTA */
async function carregar(){

let txt=await (await fetch("listas.txt?"+Date.now())).text();

let blocos=txt.split(/┏|Host/g);

lista=blocos.map(b=>{

let host=b.match(/http:\/\/[^\s]+:\d+/i)?.[0];
let user=b.match(/Usu[aá]rio[^a-z0-9]*([a-z0-9@._-]+)/i)?.[1];
let pass=b.match(/Senha[^a-z0-9]*([a-z0-9@._-]+)/i)?.[1];

let m=b.match(/username=([^\s&]+)&password=([^\s&]+)/i);
if(m){user=m[1];pass=m[2];}

let exp=null;

for(let l of b.split("\n")){
let c=l.toLowerCase();
if(c.includes("scan")||c.includes("criado")) continue;

let d=l.match(/(\d{2}\/\d{2}\/\d{4})/);

if(d && (c.includes("exp")||c.includes("venc")||c.includes("expira"))){
exp=d[1];
break;
}
}

if(host&&user&&pass){
return {host,user,pass,exp};
}

}).filter(x=>x);

status.innerHTML="✔ Sistema pronto<br>";
}

/* TESTE REAL */
async function testarReal(m3u){

try{
let r = await fetch("https://checkpainel.rf.gd/check.php?url="+encodeURIComponent(m3u));
let j = await r.json();
return j.status === "online";
}catch{
return false;
}

}

/* BOTÃO */
function startGerar(){

if(gerando) return;

gerando=true;

let btn=document.getElementById("btnGerar");
btn.innerText="⏳ CARREGANDO...";
btn.disabled=true;

abrirAd();
gerar();
}

/* SCAN */
function fakeScan(callback){

let s=document.getElementById("status");

let etapas=[
"🔍 Conectando servidor...",
"📡 Estabelecendo conexão...",
"🔐 Descriptografando dados...",
"🧠 Analisando base...",
"⚡ Buscando listas online...",
"📦 Processando dados...",
"✅ Concluído"
];

let i=0;
s.innerHTML="";

function loop(){
if(i<etapas.length){
s.innerHTML+=etapas[i]+"<br>";
s.scrollTop=s.scrollHeight;
i++;
setTimeout(loop,350);
}else callback();
}

loop();
}

/* ADS */
function carregarAds(){

let ads=document.getElementById("ads");
ads.innerHTML="";

setTimeout(()=>{

let s1=document.createElement("script");
s1.innerHTML=`atOptions={key:'a8a116d252f41a02d16bcf030d61ce58',format:'iframe',height:300,width:160,params:{}};`;

let s2=document.createElement("script");
s2.src="https://encouragingjawsordinarily.com/a8a116d252f41a02d16bcf030d61ce58/invoke.js";

ads.appendChild(s1);
ads.appendChild(s2);

},200);
}

/* GERAR */
async function gerar(){

out.style.display="none";
out.innerHTML="";
ads.innerHTML="";
status.innerHTML="";

fakeScan(async function(){

carregarAds();

let c=lista[Math.floor(Math.random()*lista.length)];

let m3u=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

let online = await testarReal(m3u);

let statusIcon = online ? "🟢 ONLINE" : "🔴 OFFLINE";
let statusColor = online ? "green" : "red";

out.innerHTML=`
<div class="box">
<div class="label">🔗 M3U</div>
<div class="val green">${m3u}</div>
</div>

<div class="box">
<div class="label">🌐 HOST</div>
<div class="val blue">${c.host}</div>
</div>

<div class="row">
<div class="box col">
<div class="label">👤 LOGIN</div>
<div class="val white">${c.user}</div>
</div>

<div class="box col">
<div class="label">🔑 SENHA</div>
<div class="val white">${c.pass}</div>
</div>
</div>

<div class="row">
<div class="box col">
<div class="label">📅 VALIDADE</div>
<div class="val purple">${c.exp||"Desconhecida"}</div>
</div>

<div class="box col">
<div class="label">📡 STATUS</div>
<div class="val ${statusColor}">${statusIcon}</div>
</div>
</div>
`;

out.style.display="block";

let btn=document.getElementById("btnGerar");
btn.innerText="🚀 GERAR ACESSO";
btn.disabled=false;
gerando=false;

});
}

/* COPIAR */
function copiar(){
navigator.clipboard.writeText(out.innerText);
status.innerHTML+="✔ Copiado<br>";
}

</script>

</body>
</html>
