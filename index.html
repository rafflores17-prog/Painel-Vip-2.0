<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador VIP IPTV</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><style>

body{
background:linear-gradient(180deg,#050505,#0b0b0b);
color:#fff;
font-family:'Inter';
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
width:100%;
max-width:420px;
background:#0e0e0e;
padding:20px;
border-radius:20px;
box-shadow:0 0 40px #000;
}

/* TITLE */
.title{
text-align:center;
font-family:'Orbitron';
color:#00ff9c;
margin-bottom:20px;
letter-spacing:2px;
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #222;
background:#000;
color:#00ff9c;
text-align:center;
margin-bottom:12px;
}

/* GRID */
.grid{
display:flex;
gap:12px;
margin-bottom:20px;
}

.grid a{flex:1;}

/* BUTTONS */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:600;
font-size:12px;
transition:.2s;
}

.vip{
background:linear-gradient(135deg,#bc13fe,#7a00aa);
box-shadow:0 0 12px #bc13fe;
}

.free{
background:linear-gradient(135deg,#00d2ff,#006a80);
box-shadow:0 0 12px #00d2ff;
}

.main{
background:linear-gradient(135deg,#00ff9c,#008f58);
color:#000;
}

.btn:hover{transform:scale(1.05);}

/* STATUS */
.status{
text-align:center;
font-size:11px;
color:#888;
margin-top:10px;
}

/* LOADER */
.loader{
height:4px;
background:#222;
border-radius:10px;
overflow:hidden;
display:none;
margin-top:10px;
}

.loader span{
display:block;
height:100%;
width:40%;
background:linear-gradient(90deg,#00ff9c,#00d2ff);
animation:load 1s infinite;
}

@keyframes load{
0%{margin-left:-40%;}
100%{margin-left:100%;}
}

/* RESULT */
#out{
display:none;
margin-top:20px;
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.card-info{
background:#121212;
padding:12px;
border-radius:12px;
margin-bottom:10px;
border:1px solid #1f1f1f;
}

.label{
font-size:9px;
color:#777;
letter-spacing:1px;
margin-bottom:4px;
}

.value{
font-size:13px;
font-weight:600;
}

.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

/* HISTORY */
.history{
margin-top:15px;
font-size:10px;
color:#666;
}

/* COPY */
.copy.done{
background:#00ff9c;
color:#000;
}

</style></head><body><div class="card"><div class="title">GERADOR VIP IPTV</div><!-- LOGIN --><div id="login">
<input type="password" id="senha" placeholder="DIGITE A CHAVE">
<button class="btn main" onclick="logar()">DESBLOQUEAR SISTEMA</button>
</div><!-- PAINEL --><div id="painel" style="display:none;"><div class="grid">
<a href="https://rafflores17-prog.github.io/vip-apk/" target="_blank">
<button class="btn vip">💎 VIP</button></a><a href="https://t.me/ApkBugado" target="_blank">
<button class="btn free">📢 FREE</button></a>
</div><button class="btn main" onclick="gerar()">GERAR ACESSO</button>

<div class="status" id="status">Sistema pronto</div><div class="loader" id="loader"><span></span></div><div id="out"></div><div class="history" id="history"></div></div></div><script>

let lista=[];
let usadas=[];
let ultimoHost=null;

/* LOGIN */
async function logar(){
let senha=document.getElementById("senha").value.trim();
let cfg=await (await fetch("config.json")).json();

if(cfg.access_keys.includes(senha)){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
carregar();
}else{
alert("ACESSO NEGADO");
}
}

/* PARSE DATA */
function parseData(d){
if(!d) return 0;
let p=d.split("/");
return new Date(p[2],p[1]-1,p[0]).getTime();
}

/* CARREGAR */
async function carregar(){

let status=document.getElementById("status");
status.innerText="Sincronizando base...";

let t=await (await fetch("listas.txt?"+Date.now())).text();

let blocos=t.split(/┏|『/g);

lista=blocos.map(b=>{

b=b.normalize("NFD").replace(/[^\x00-\x7F]/g,"");

let host=b.match(/http:\/\/[^\s]+:\d+/i)?.[0];
let user=b.match(/user[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let pass=b.match(/pass[^a-z0-9]*([a-z0-9._-]+)/i)?.[1];
let exp=b.match(/(expira|vencimento)[^0-9]*([0-9\/]+)/i)?.[2];

let m=b.match(/get\.php\?username=([^\s&]+)&password=([^\s&]+)/i);

if(m){
return {host,user:m[1],pass:m[2],exp};
}

if(host&&user&&pass){
return {host,user,pass,exp};
}

}).filter(x=>x);

/* ordenar melhores */
lista.sort((a,b)=>parseData(b.exp)-parseData(a.exp));

status.innerText=lista.length+" contas disponíveis";
mostrarHistorico();
}

/* TESTE */
async function testar(link){
try{
let r=await fetch(link,{method:"HEAD"});
return r.status==200;
}catch{
return false;
}
}

/* GERAR */
async function gerar(){

let out=document.getElementById("out");
let status=document.getElementById("status");
let loader=document.getElementById("loader");

out.style.display="none";
loader.style.display="block";

status.innerText="Processando...";
await delay(400);

let disponiveis=lista.filter(x=>!usadas.includes(x.user));
if(disponiveis.length==0){usadas=[];disponiveis=lista;}

let filtrado=disponiveis.filter(x=>x.host!==ultimoHost);
if(filtrado.length==0) filtrado=disponiveis;

let c=filtrado[Math.floor(Math.random()*filtrado.length)];

usadas.push(c.user);
ultimoHost=c.host;

let link=`${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=ts`;

status.innerText="Testando conexão...";
let online=await testar(link);

let statusOnline=online?"🟢 ONLINE":"🔴 OFFLINE";

/* HIST */
let hist=JSON.parse(localStorage.getItem("hist")||"[]");
hist.unshift(c);
hist=hist.slice(0,5);
localStorage.setItem("hist",JSON.stringify(hist));

out.innerHTML=`

<div style="text-align:center;color:#bc13fe;margin-bottom:10px;">
ACESSO LIBERADO
</div>

<div class="card-info">
<div class="label">HOST</div>
<div class="value" style="color:#00d2ff;">${c.host}</div>
</div>

<div class="card-info">
<div class="label">LINK M3U</div>
<div class="value" style="color:#00ff9c;font-size:11px;">${link}</div>
</div>

<div class="grid-2">

<div class="card-info">
<div class="label">USUÁRIO</div>
<div class="value" style="color:#00ff9c;">${c.user}</div>
</div>

<div class="card-info">
<div class="label">SENHA</div>
<div class="value" style="color:#f9d423;">${c.pass}</div>
</div>

<div class="card-info">
<div class="label">VALIDADE</div>
<div class="value" style="color:#bc13fe;">${c.exp || "N/A"}</div>
</div>

<div class="card-info">
<div class="label">STATUS</div>
<div class="value">${statusOnline}</div>
</div>

</div>

<button class="btn main copy" onclick="copiar('${link}', this)">COPIAR</button>

`;

loader.style.display="none";
out.style.display="block";
status.innerText="Acesso pronto";

mostrarHistorico();
}

/* HISTÓRICO */
function mostrarHistorico(){
let h=JSON.parse(localStorage.getItem("hist")||"[]");
document.getElementById("history").innerHTML=
"<br>Últimos acessos:<br>"+h.map(x=>"• "+x.user).join("<br>");
}

/* COPY */
function copiar(text,btn){
navigator.clipboard.writeText(text);
btn.innerText="COPIADO ✔";
btn.classList.add("done");

setTimeout(()=>{
btn.innerText="COPIAR";
btn.classList.remove("done");
},1500);
}

function delay(ms){
return new Promise(r=>setTimeout(r,ms));
}

</script></body>
</html>
