<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APK BUGADO - DASHBOARD VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #39ff14; --neon-purple: #bc13fe; --dark: #050505; --card-bg: #0a0a0a; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--dark); color: var(--neon-green); 
            font-family: 'Source Code Pro', monospace; 
            margin: 0; padding: 0; min-height: 100vh;
            overflow-x: hidden;
        }

        /* TELA DE LOGIN */
        #lock-screen {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            border: 2px solid var(--neon-purple); padding: 30px;
            background: var(--card-bg); box-shadow: 0 0 20px var(--neon-purple);
            width: 85%; max-width: 350px; border-radius: 15px; text-align: center;
        }

        /* ESTRUTURA DO PAINEL */
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        header { 
            text-align: center; margin-bottom: 30px; 
            border-bottom: 1px solid #1a1a1a; padding-bottom: 20px;
        }

        .dashboard-title { 
            font-family: 'Orbitron'; font-size: 22px; margin: 0;
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* ESTILO DOS CARDS (IGUAL À SUA REFERÊNCIA) */
        .account-card {
            background: var(--card-bg); border: 1px solid #1a1a1a;
            border-left: 5px solid var(--neon-purple); border-radius: 10px;
            padding: 15px; margin-bottom: 20px; position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        .status-badge {
            position: absolute; top: 10px; right: 10px;
            background: var(--neon-green); color: #000;
            font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 4px;
        }

        .info-row { margin-bottom: 10px; }
        .label { 
            display: flex; align-items: center; gap: 5px;
            color: var(--neon-purple); font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
        .value { color: #fff; font-size: 14px; display: block; margin-top: 2px; }

        /* BOTÕES */
        button {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
            margin-top: 10px; font-size: 11px;
        }
        .btn-copy { background: linear-gradient(45deg, #6200ea, #bc13fe); color: white; }
        .btn-unlock { background: var(--neon-green); color: #000; font-weight: bold; margin-top: 20px; }

        input {
            background: #000; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 12px; width: 100%;
            text-align: center; font-family: 'Orbitron'; outline: none;
        }

        .sync-btn {
            background: var(--neon-purple); color: #fff; padding: 10px;
            border-radius: 20px; margin-bottom: 20px; font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-box">
            <h2 style="font-family: 'Orbitron'; color: var(--neon-purple);">SISTEMA VIP</h2>
            <input type="password" id="pass-key" placeholder="CHAVE MESTRE">
            <button class="btn-unlock" onclick="unlock()">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div class="container" id="main-content" style="display:none;">
        <header>
            <h1 class="dashboard-title">APK BUGADO DASHBOARD</h1>
            <p style="font-size: 10px; color: #555;">CONTAS ATIVAS NO SISTEMA</p>
            <div class="sync-btn" onclick="location.reload()">🔄 SINCRONIZAR LISTA</div>
        </header>

        <div id="accounts-list">
            </div>
    </div>

<script>
    async function unlock() {
        const input = document.getElementById('pass-key').value.trim();
        try {
            const res = await fetch('config.json');
            const config = await res.json();
            if (config.access_keys.includes(input)) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadData();
            } else { alert("CHAVE INCORRETA!"); }
        } catch (e) { alert("Erro ao validar config.json"); }
    }

    async function loadData() {
        try {
            const response = await fetch('listas.txt');
            const text = await response.text();
            
            // Regex para capturar os blocos bagunçados
            const blocks = text.split(/┏●|『|▬▬▬▬▬|🌐Host/).filter(b => b.includes('http'));
            const listDiv = document.getElementById('accounts-list');
            listDiv.innerHTML = '';

            blocks.forEach(block => {
                const host = block.match(/(?:http:\/\/[a-zA-Z0-9.-]+:[0-9]+)/i)?.[0];
                const user = block.match(/(?:Usuário|Usᴜᴀʀɪᴏ|👤Usuário)\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1];
                const pass = block.match(/(?:Senha|Sᴇɴʜᴀ|🔒Senha)\s*►\s*([a-zA-Z0-9._-]+)/i)?.[1];
                const exp = block.match(/(?:Expira|Vᴇɴᴄɪᴍᴇɴᴛᴏ|⏳Expira)\s*►\s*([0-9\/.]+)/i)?.[1];

                if (host && user && pass) {
                    const m3u = `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=ts`;
                    
                    listDiv.innerHTML += `
                        <div class="account-card">
                            <div class="status-badge">ONLINE</div>
                            <div class="info-row">
                                <span class="label">🌐 PORTAL / DNS</span>
                                <span class="value">${host}</span>
                            </div>
                            <div class="info-row" style="display: flex; gap: 20px;">
                                <div style="flex:1">
                                    <span class="label">👤 USUÁRIO</span>
                                    <span class="value">${user}</span>
                                </div>
                                <div style="flex:1">
                                    <span class="label">🔑 SENHA</span>
                                    <span class="value">${pass}</span>
                                </div>
                            </div>
                            <div class="info-row">
                                <span class="label">📅 VALIDADE SCANNER</span>
                                <span class="value" style="color:yellow">${exp || 'Sincronizando...'}</span>
                            </div>
                            <button class="btn-copy" onclick="copyText('${m3u}')">COPIAR LINK M3U8</button>
                        </div>
                    `;
                }
            });

            if (listDiv.innerHTML === '') {
                listDiv.innerHTML = '<p style="text-align:center; color:#555;">Nenhuma conta encontrada no arquivo listas.txt</p>';
            }
        } catch (e) { alert("Certifique-se que o arquivo listas.txt está no GitHub."); }
    }

    function copyText(txt) {
        navigator.clipboard.writeText(txt);
        alert("Link copiado com sucesso!");
    }
</script>
</body>
</html>
